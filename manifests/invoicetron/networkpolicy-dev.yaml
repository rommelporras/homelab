# CiliumNetworkPolicies for invoicetron-dev
# Pods: invoicetron (app=invoicetron, port 3000), invoicetron-db (app=invoicetron-db, port 5432)
# Pattern A: Web App + Database (PostgreSQL)
# Default-deny enforced implicitly (ingress + egress policies cover both directions per pod)
---
# App ingress: Gateway HTTPRoute + kubelet HTTP probe on 3000
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-gateway-ingress
  namespace: invoicetron-dev
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
# App egress: DNS + PostgreSQL
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-egress
  namespace: invoicetron-dev
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app: invoicetron-db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# DB ingress: only invoicetron app can reach the database
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-db-ingress
  namespace: invoicetron-dev
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron-db
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: invoicetron
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# DB egress: DNS only (exec probe - no kubelet network needed)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-db-egress
  namespace: invoicetron-dev
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron-db
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
