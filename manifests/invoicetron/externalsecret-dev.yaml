# ExternalSecrets for Invoicetron Dev
# Phase 4.29: Replaces imperative kubectl create secret for invoicetron-dev namespace
#
# 1. invoicetron-db — Vault: secret/invoicetron-dev/db (1 key)
# 2. invoicetron-app — Vault: secret/invoicetron-dev/app (2 keys)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoicetron-db
  namespace: invoicetron-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: invoicetron-db
  data:
    - secretKey: postgres-password
      remoteRef:
        key: invoicetron-dev/db
        property: postgres-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoicetron-app
  namespace: invoicetron-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: invoicetron-app
  data:
    - secretKey: database-url
      remoteRef:
        key: invoicetron-dev/app
        property: database-url
    - secretKey: better-auth-secret
      remoteRef:
        key: invoicetron-dev/app
        property: better-auth-secret
