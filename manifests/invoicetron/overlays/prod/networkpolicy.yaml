# CiliumNetworkPolicies for invoicetron-prod
# Phase 5.9.1: Namespace stripped - set by Kustomize overlay
# Pods:
#   invoicetron (app=invoicetron, port 3000) - HTTPRoute + Cloudflare tunnel
#   invoicetron-db (app=invoicetron-db, port 5432) - DB, exec probe only
#   invoicetron-db-backup (app=invoicetron-db-backup) - CronJob, egress to DB only
# Pattern A: Web App + Database (PostgreSQL)
# Default-deny enforced implicitly (ingress + egress policies cover both directions per pod)
---
# App ingress: Gateway HTTPRoute + Cloudflare direct tunnel + kubelet HTTP probe on 3000
# cloudflared connects directly to invoicetron pods for invoicetron.rommelporras.com
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-gateway-ingress
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cloudflare
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Monitoring: blackbox exporter probes + Prometheus scraping
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
# App egress: DNS + PostgreSQL + UCSD directory lookup
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-egress
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            app: invoicetron-db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toFQDNs:
        - matchName: itsweb.ucsd.edu
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# DB ingress: invoicetron app + backup CronJob + legacy migrate Job +
# argo-workflows ci-pipeline migrate pods (Phase 5.9.1 Stage 2) can
# reach the database. The legacy `job-name: invoicetron-migrate`
# label selector is kept for fallback while GitLab CI deploy is set
# to `when: manual`; once Stage 2 is fully cut over it can be removed.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-db-ingress
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron-db
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: invoicetron
        - matchLabels:
            app: invoicetron-db-backup
        - matchLabels:
            job-name: invoicetron-migrate
        # See dev overlay and invoicetron-pipeline migrate template
        # for why this matches `invoicetron-migrate: "true"` (Argo
        # Workflows v4.0.4 `podMetadata.labels` override quirk).
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: argo-workflows
            invoicetron-migrate: "true"
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# DB egress: DNS only (exec probe - no kubelet network needed)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-db-egress
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron-db
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# Migration job egress: DNS + PostgreSQL (Stage 2 Argo Workflows runs Prisma migrate deploy)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-migrate-egress
spec:
  endpointSelector:
    matchLabels:
      job-name: invoicetron-migrate
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app: invoicetron-db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
# Backup CronJob egress: DNS + PostgreSQL only
# Pod label app=invoicetron-db-backup added to CronJob template (backup-cronjob.yaml)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: invoicetron-backup-egress
spec:
  endpointSelector:
    matchLabels:
      app: invoicetron-db-backup
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app: invoicetron-db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
