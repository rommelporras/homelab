# Invoicetron prod overlay
# Phase 5.9.1 - ArgoCD onboarding via Kustomize
#
# Image: registry.k8s.rommelporras.com/0xwsh/invoicetron/prod
# Tag: pinned to currently-running live image (zero cluster drift at first sync)
resources:
- ../../base
- namespace.yaml
- externalsecret.yaml
- networkpolicy.yaml
- limitrange.yaml
- resourcequota.yaml
- backup-cronjob.yaml
namespace: invoicetron-prod
images:
- name: app
  newName: registry.k8s.rommelporras.com/0xwsh/invoicetron/prod
  newTag: dcc8c497
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
