# ExternalSecrets for Invoicetron Dev
# Phase 4.29: Replaces imperative kubectl create secret for invoicetron-dev namespace
# Phase 5.9.1: Namespace stripped - set by Kustomize overlay
#
# 1. invoicetron-db — Vault: secret/invoicetron-dev/db (1 key)
# 2. invoicetron-app — Vault: secret/invoicetron-dev/app (2 keys)
# 3. gitlab-registry — Vault: secret/invoicetron/deploy-token (dockerconfigjson)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoicetron-db
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: invoicetron-db
  data:
    - secretKey: postgres-password
      remoteRef:
        key: invoicetron-dev/db
        property: postgres-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoicetron-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: invoicetron-app
  data:
    - secretKey: database-url
      remoteRef:
        key: invoicetron-dev/app
        property: database-url
    - secretKey: better-auth-secret
      remoteRef:
        key: invoicetron-dev/app
        property: better-auth-secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-registry
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"registry.k8s.rommelporras.com":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: invoicetron/deploy-token
        property: username
    - secretKey: password
      remoteRef:
        key: invoicetron/deploy-token
        property: password
