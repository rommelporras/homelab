# Invoicetron App Deployment + Service
# Phase 4.9 - Invoicetron Migration
# Apply to each namespace: invoicetron-dev, invoicetron-prod
#
# Next.js 16 + Bun app with PostgreSQL backend
# Init container waits for DB readiness before app starts
# NEXT_PUBLIC_APP_URL is baked at Docker build time, not runtime
# Each environment has its own image built with the correct URL
#
# CKA topics: Init containers, Deployments, RollingUpdate strategy,
#             security context (runAsNonRoot, drop ALL), liveness/readiness probes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoicetron
  labels:
    app: invoicetron
    app.kubernetes.io/part-of: invoicetron
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoicetron
  # Recreate: kills old pod before starting new one. Required because
  # ResourceQuota (4 CPU) can't fit both old + new pod simultaneously.
  # Single replica = no zero-downtime regardless of strategy.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: invoicetron
    spec:
      automountServiceAccountToken: false
      # Note: CI/CD patches the image field - do not kubectl apply this manifest directly
      imagePullSecrets:
      - name: gitlab-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 60
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 60
      initContainers:
      - name: wait-for-db
        image: busybox:1.37
        command: ['sh', '-c', 'until nc -z invoicetron-db 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done; echo "PostgreSQL is ready!"']
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      containers:
      - name: invoicetron
        # CI/CD patches this image on deploy via `kubectl set image`.
        # WARNING: Do not apply this manifest directly - dev and prod use different
        # image paths (invoicetron/dev vs invoicetron/prod). CI handles this per-env.
        image: registry.k8s.rommelporras.com/0xwsh/invoicetron/prod:41b280b8
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: invoicetron-app
              key: database-url
        - name: BETTER_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: invoicetron-app
              key: better-auth-secret
        - name: NODE_ENV
          value: production
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: invoicetron
  labels:
    app: invoicetron
    app.kubernetes.io/part-of: invoicetron
spec:
  type: ClusterIP
  selector:
    app: invoicetron
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
