# ARR Stack Backup CronJob - k8s-cp3 (bazarr, jellyfin)
# Phase 5.4 D2: Daily config backup to NAS via NFS
#
# Schedule: Daily 02:25 Manila time (staggered, all 3 nodes run in parallel)
# Retention: 3 days (deep history in restic off-site)
# Node: k8s-cp3 - bazarr (SQLite), jellyfin (SQLite metadata DB + config)
#
# Manual test run:
#   kubectl-homelab create job --from=cronjob/arr-backup-cp3 arr-backup-cp3-test -n arr-stack
#   kubectl-homelab logs -n arr-stack job/arr-backup-cp3-test
#
# CKA topics: CronJob, NFS volume, SQLite backup, nodeSelector
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: arr-backup-cp3
  namespace: arr-stack
  labels:
    app: arr-backup
    app.kubernetes.io/part-of: arr-stack
    backup-node: cp3
spec:
  schedule: "25 2 * * *"
  timeZone: "Asia/Manila"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: arr-backup-cp3
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          nodeSelector:
            kubernetes.io/hostname: k8s-cp3
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: keinos/sqlite3:3.46.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  export TZ=UTC-8
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  # --- Bazarr (SQLite) ---
                  echo "=== Bazarr ==="
                  mkdir -p /backup/bazarr
                  find /bazarr-config -name "*.db" -not -name "*-shm" -not -name "*-wal" -not -path "*/lost+found/*" -type f | while read db; do
                    DBNAME=$(basename "$db")
                    sqlite3 "file:${db}?immutable=1" ".backup /backup/bazarr/${DBNAME%.db}-${TIMESTAMP}.db"
                    echo "  SQLite backup: $DBNAME"
                  done

                  # --- Jellyfin (SQLite metadata + config) ---
                  echo "=== Jellyfin ==="
                  mkdir -p /backup/jellyfin
                  for db in /jellyfin-config/data/*.db; do
                    [ -f "$db" ] || continue
                    DBNAME=$(basename "$db")
                    sqlite3 "file:${db}?immutable=1" ".backup /backup/jellyfin/${DBNAME%.db}-${TIMESTAMP}.db"
                    echo "  SQLite backup: $DBNAME"
                  done

                  # --- Prune old backups ---
                  find /backup/bazarr -name "*-*.db" -mtime +3 -delete 2>/dev/null || true
                  find /backup/jellyfin -name "*-*.db" -mtime +3 -delete 2>/dev/null || true
                  echo "Backup complete (cp3)"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits: { cpu: 200m, memory: 256Mi }
              volumeMounts:
                - name: bazarr-config
                  mountPath: /bazarr-config
                - name: jellyfin-config
                  mountPath: /jellyfin-config
                - name: backup
                  mountPath: /backup
          volumes:
            - name: bazarr-config
              persistentVolumeClaim:
                claimName: bazarr-config
            - name: jellyfin-config
              persistentVolumeClaim:
                claimName: jellyfin-config
            - name: backup
              nfs:
                server: 10.10.30.4
                path: /Kubernetes/Backups/arr-configs
