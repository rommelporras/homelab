# ARR Stack Backup CronJob - k8s-cp1 (prowlarr, qbittorrent)
# Phase 5.4 D2: Daily config backup to NAS via NFS
#
# ARR pods are spread across 3 nodes. RWO PVCs can't cross nodes.
# Separate per-node CronJobs with nodeSelector matching the app's node.
#
# Schedule: Daily 02:25 Manila time (staggered, all 3 nodes run in parallel)
# Retention: 3 days (deep history in restic off-site)
# Node: k8s-cp1 - prowlarr (SQLite), qbittorrent (non-SQLite config)
#
# Manual test run:
#   kubectl-homelab create job --from=cronjob/arr-backup-cp1 arr-backup-cp1-test -n arr-stack
#   kubectl-homelab logs -n arr-stack job/arr-backup-cp1-test
#
# CKA topics: CronJob, NFS volume, SQLite backup, nodeSelector, multi-PVC mount
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: arr-backup-cp1
  namespace: arr-stack
  labels:
    app: arr-backup
    app.kubernetes.io/part-of: arr-stack
    backup-node: cp1
spec:
  schedule: "25 2 * * *"
  timeZone: "Asia/Manila"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: arr-backup-cp1
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          nodeSelector:
            kubernetes.io/hostname: k8s-cp1
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: keinos/sqlite3:3.46.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  export TZ=UTC-8
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  # --- Prowlarr (SQLite) ---
                  echo "=== Prowlarr ==="
                  mkdir -p /backup/prowlarr
                  find /prowlarr-config -name "*.db" -not -name "*-shm" -not -name "*-wal" -type f | while read db; do
                    DBNAME=$(basename "$db")
                    sqlite3 "file:${db}?immutable=1" ".backup /backup/prowlarr/${DBNAME%.db}-${TIMESTAMP}.db"
                    echo "  SQLite backup: $DBNAME"
                  done

                  # --- qBittorrent (non-SQLite config) ---
                  echo "=== qBittorrent ==="
                  mkdir -p "/backup/qbittorrent/config-${TIMESTAMP}"
                  cp -a /qbittorrent-config/qBittorrent/ "/backup/qbittorrent/config-${TIMESTAMP}/" 2>/dev/null || true
                  echo "  Config backup: config-${TIMESTAMP}/"

                  # --- Prune old backups ---
                  find /backup/prowlarr -name "*-*.db" -mtime +3 -delete
                  find /backup/qbittorrent -name "config-*" -type d -mtime +3 -exec rm -rf {} + 2>/dev/null || true
                  echo "Backup complete (cp1)"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits: { cpu: 200m, memory: 256Mi }
              volumeMounts:
                - name: prowlarr-config
                  mountPath: /prowlarr-config
                - name: qbittorrent-config
                  mountPath: /qbittorrent-config
                - name: backup
                  mountPath: /backup
          volumes:
            - name: prowlarr-config
              persistentVolumeClaim:
                claimName: prowlarr-config
            - name: qbittorrent-config
              persistentVolumeClaim:
                claimName: qbittorrent-config
            - name: backup
              nfs:
                server: 10.10.30.4
                path: /Kubernetes/Backups/arr-configs
