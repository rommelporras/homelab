# ExternalSecrets for ARR Stack
# Phase 4.29: Replaces manifests/arr-stack/arr-api-keys-secret.yaml
#
# 1. arr-api-keys — Vault: secret/arr-stack/api-keys (5 keys)
# 2. qbittorrent-exporter-secret — Vault: secret/arr-stack/qbittorrent (1 key)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arr-api-keys
  namespace: arr-stack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: arr-api-keys
  dataFrom:
    - extract:
        key: arr-stack/api-keys
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qbittorrent-exporter-secret
  namespace: arr-stack
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: qbittorrent-exporter-secret
  data:
    - secretKey: QBITTORRENT_PASS
      remoteRef:
        key: arr-stack/qbittorrent
        property: QBITTORRENT_PASS
