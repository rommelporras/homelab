# ARR Stack Backup CronJob - k8s-cp2 (bazarr, radarr, sonarr, tdarr, seerr, recommendarr)
# Phase 5.4 D2: Daily config backup to NAS via NFS
#
# Schedule: Daily 02:25 Manila time (staggered, all 3 nodes run in parallel)
# Retention: 3 days (deep history in restic off-site)
# Node: k8s-cp2 - bazarr/radarr/sonarr/seerr/recommendarr (SQLite), tdarr (non-SQLite)
#
# Manual test run:
#   kubectl-homelab create job --from=cronjob/arr-backup-cp2 arr-backup-cp2-test -n arr-stack
#   kubectl-homelab logs -n arr-stack job/arr-backup-cp2-test
#
# CKA topics: CronJob, NFS volume, SQLite backup, nodeSelector, multi-PVC mount
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: arr-backup-cp2
  namespace: arr-stack
  labels:
    app: arr-backup
    app.kubernetes.io/part-of: arr-stack
    backup-node: cp2
spec:
  schedule: "25 2 * * *"
  timeZone: "Asia/Manila"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: arr-backup-cp2
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          nodeSelector:
            kubernetes.io/hostname: k8s-cp2
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: keinos/sqlite3:3.46.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  export TZ=UTC-8
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)

                  # Helper: find and backup all SQLite DBs recursively
                  backup_sqlite() {
                    APP="$1"
                    SRC="$2"
                    mkdir -p "/backup/${APP}"
                    find "${SRC}" \( -name "*.db" -o -name "*.sqlite3" \) -not -name "*-shm" -not -name "*-wal" -type f | while read db; do
                      DBNAME=$(basename "$db")
                      sqlite3 "file:${db}?immutable=1" ".backup /backup/${APP}/${DBNAME%.*}-${TIMESTAMP}.db"
                      echo "  SQLite backup: $DBNAME"
                    done
                  }

                  # --- SQLite apps ---
                  # bazarr: db/bazarr.db, radarr/sonarr: *.db at root
                  for APP in bazarr radarr sonarr; do
                    echo "=== ${APP} ==="
                    backup_sqlite "$APP" "/${APP}-config"
                  done

                  # seerr: db/db.sqlite3
                  echo "=== seerr ==="
                  backup_sqlite "seerr" "/seerr-config"

                  echo "=== recommendarr ==="
                  backup_sqlite "recommendarr" "/recommendarr-config"

                  # --- Tdarr (non-SQLite embedded DB) ---
                  echo "=== tdarr ==="
                  mkdir -p "/backup/tdarr/server-${TIMESTAMP}"
                  # Copy server data (embedded DB, plugins, etc.)
                  cp -a /tdarr-server/Tdarr/ "/backup/tdarr/server-${TIMESTAMP}/" 2>/dev/null || true
                  # Copy configs
                  mkdir -p "/backup/tdarr/configs-${TIMESTAMP}"
                  cp -a /tdarr-configs/configs/ "/backup/tdarr/configs-${TIMESTAMP}/" 2>/dev/null || true
                  cp -a /tdarr-configs/logs/ "/backup/tdarr/configs-${TIMESTAMP}/logs/" 2>/dev/null || true
                  echo "  Server + configs backup: server-${TIMESTAMP}/ configs-${TIMESTAMP}/"

                  # --- Prune old backups ---
                  for APP in bazarr radarr sonarr seerr recommendarr; do
                    find "/backup/${APP}" -name "*-*.db" -mtime +3 -delete 2>/dev/null || true
                  done
                  find /backup/tdarr -name "server-*" -type d -mtime +3 -exec rm -rf {} + 2>/dev/null || true
                  find /backup/tdarr -name "configs-*" -type d -mtime +3 -exec rm -rf {} + 2>/dev/null || true
                  echo "Backup complete (cp2)"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 100m, memory: 128Mi }
                limits: { cpu: 500m, memory: 512Mi }
              volumeMounts:
                - name: bazarr-config
                  mountPath: /bazarr-config
                - name: radarr-config
                  mountPath: /radarr-config
                - name: sonarr-config
                  mountPath: /sonarr-config
                - name: tdarr-server
                  mountPath: /tdarr-server
                - name: tdarr-configs
                  mountPath: /tdarr-configs
                - name: seerr-config
                  mountPath: /seerr-config
                - name: recommendarr-config
                  mountPath: /recommendarr-config
                - name: backup
                  mountPath: /backup
          volumes:
            - name: bazarr-config
              persistentVolumeClaim:
                claimName: bazarr-config
            - name: radarr-config
              persistentVolumeClaim:
                claimName: radarr-config
            - name: sonarr-config
              persistentVolumeClaim:
                claimName: sonarr-config
            - name: tdarr-server
              persistentVolumeClaim:
                claimName: tdarr-server
            - name: tdarr-configs
              persistentVolumeClaim:
                claimName: tdarr-configs
            - name: seerr-config
              persistentVolumeClaim:
                claimName: seerr-config
            - name: recommendarr-config
              persistentVolumeClaim:
                claimName: recommendarr-config
            - name: backup
              nfs:
                server: 10.10.30.4
                path: /Kubernetes/Backups/arr-configs
