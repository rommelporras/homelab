# ARR Backup CronJob: tdarr
# Per-app backup with podAffinity (follows app pod to any node)
# Schedule: 02:25 Manila | Retention: 3 days | NFS: 10.10.30.4
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: arr-backup-tdarr
  namespace: arr-stack
  labels:
    app: arr-backup-tdarr
    app.kubernetes.io/part-of: arr-stack
spec:
  schedule: "25 2 * * *"
  timeZone: "Asia/Manila"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app: arr-backup-tdarr
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: tdarr
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: keinos/sqlite3:3.52.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  export TZ=UTC-8
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  echo "=== Tdarr ==="
                  mkdir -p "/backup/tdarr/server-${TIMESTAMP}"
                  cp -r /tdarr-server/Tdarr/ "/backup/tdarr/server-${TIMESTAMP}/" 2>/dev/null || true
                  mkdir -p "/backup/tdarr/configs-${TIMESTAMP}"
                  cp -r /tdarr-configs/configs/ "/backup/tdarr/configs-${TIMESTAMP}/" 2>/dev/null || true
                  cp -r /tdarr-configs/logs/ "/backup/tdarr/configs-${TIMESTAMP}/logs/" 2>/dev/null || true
                  echo "  Server + configs backup: server-${TIMESTAMP}/ configs-${TIMESTAMP}/"
                  find /backup/tdarr -name "server-*" -type d -mtime +3 -exec rm -rf {} + 2>/dev/null || true
                  find /backup/tdarr -name "configs-*" -type d -mtime +3 -exec rm -rf {} + 2>/dev/null || true
                  echo "Backup complete (tdarr)"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 100m, memory: 128Mi }
                limits: { cpu: 200m, memory: 256Mi }
              volumeMounts:
                - name: tdarr-server
                  mountPath: /tdarr-server
                - name: tdarr-configs
                  mountPath: /tdarr-configs
                - name: backup
                  mountPath: /backup
          volumes:
            - name: tdarr-server
              persistentVolumeClaim:
                claimName: tdarr-server
            - name: tdarr-configs
              persistentVolumeClaim:
                claimName: tdarr-configs
            - name: backup
              nfs:
                server: 10.10.30.4
                path: /Kubernetes/Backups/arr-configs
