# ExternalSecret for Velero S3 credentials
# Phase 5.4 D3 - Creates velero-s3-credentials in AWS credentials file format
#
# Vault path: secret/velero/s3-credentials
# Creates K8s Secret: velero-s3-credentials with key "cloud"
# Template composes AWS credentials file format from individual Vault fields
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-s3-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-s3-credentials
    template:
      engineVersion: v2
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .aws_access_key_id }}
          aws_secret_access_key={{ .aws_secret_access_key }}
  data:
    - secretKey: aws_access_key_id
      remoteRef:
        key: velero/s3-credentials
        property: aws_access_key_id
    - secretKey: aws_secret_access_key
      remoteRef:
        key: velero/s3-credentials
        property: aws_secret_access_key
