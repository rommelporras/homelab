# ExternalSecret for Garage S3 secrets
# Phase 5.4 D3 - Velero + Garage S3
#
# Vault path: secret/velero/garage
# Creates K8s Secret: garage-secrets (3 keys via dataFrom.extract)
# Keys: rpc-secret, admin-token, metrics-token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: garage-secrets
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: garage-secrets
  dataFrom:
    - extract:
        key: velero/garage
