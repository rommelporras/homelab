# ConfigMap for Garage S3 configuration
# Phase 5.4 D3 - Velero + Garage S3
#
# Garage config reference: https://garagehq.deuxfleurs.fr/documentation/reference-manual/configuration/
# Secrets (rpc_secret, admin_token, metrics_token) injected via env vars, not in config file
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: velero
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sqlite"
    replication_factor = 1
    compression_level = 1

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "127.0.0.1:3901"
    # rpc_secret from GARAGE_RPC_SECRET env var

    [s3_api]
    s3_region = "garage"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.localhost"

    [admin]
    api_bind_addr = "0.0.0.0:3903"
    # admin_token from GARAGE_ADMIN_TOKEN env var
    # metrics_token from GARAGE_METRICS_TOKEN env var
