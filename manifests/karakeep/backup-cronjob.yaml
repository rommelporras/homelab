# Karakeep Backup CronJob
# Phase 5.4 D2: Daily data backup to NAS via NFS
#
# Schedule: Daily 02:15 Manila time (staggered with other backups)
# Retention: 3 days (deep history in restic off-site)
#
# Karakeep uses Better-SQLite3 (Drizzle ORM) for data storage at /data.
# This CronJob backs up the SQLite DB files using .backup API and
# copies other data files (assets, uploads) with cp.
#
# NOTE: only karakeep-data is backed up here. meilisearch-data is a
# separate RWO PVC that may attach to a different node than karakeep,
# and a single CronJob cannot mount two RWO volumes split across
# nodes. Meilisearch is a rebuildable search index over karakeep data
# (the source of truth), so omitting it is intentional.
#
# Manual test run:
#   kubectl-homelab create job --from=cronjob/karakeep-backup karakeep-backup-test -n karakeep
#   kubectl-homelab logs -n karakeep job/karakeep-backup-test
#
# CKA topics: CronJob, NFS volume, SQLite backup, podAffinity
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: karakeep-backup
  namespace: karakeep
  labels:
    app: karakeep-backup
    app.kubernetes.io/part-of: karakeep
spec:
  schedule: "15 2 * * *"
  timeZone: "Asia/Manila"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: karakeep-backup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          # Must run on the same node as the karakeep pod (RWO PVC).
          # Earlier this was a hardcoded `nodeSelector: hostname=k8s-cp2`
          # which silently broke the day karakeep migrated to cp3
          # (2026-04-29 incident: lastSchedule>lastSuccessful, ArgoCD
          # reported Degraded, cluster-janitor pruned the failed Job
          # within 10 min so the evidence was gone). podAffinity follows
          # whichever node the karakeep deployment runs on.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: karakeep
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: keinos/sqlite3:3.52.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  export TZ=UTC-8
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR="/backup/karakeep-${TIMESTAMP}"
                  mkdir -p "$BACKUP_DIR"
                  # Backup SQLite databases using safe .backup API
                  for db in /data/*.db; do
                    if [ -f "$db" ]; then
                      DBNAME=$(basename "$db")
                      sqlite3 "file:${db}?immutable=1" ".backup ${BACKUP_DIR}/${DBNAME}"
                      echo "SQLite backup: ${DBNAME}"
                    fi
                  done
                  # Copy non-DB data files (assets, uploads)
                  # Use cp -r (not -a): ownership preservation fails as non-root on NFS
                  # Skip lost+found (mode 770, not world-readable) and other unreadable dirs
                  for dir in /data/*/; do
                    DIRNAME=$(basename "$dir")
                    [ "$DIRNAME" = "lost+found" ] && continue
                    if [ -d "$dir" ]; then
                      cp -r "$dir" "${BACKUP_DIR}/${DIRNAME}/" && echo "Directory backup: ${DIRNAME}/" || echo "Directory backup skipped (unreadable): ${DIRNAME}/"
                    fi
                  done
                  echo "Backup created: $BACKUP_DIR ($(du -sh "$BACKUP_DIR" 2>/dev/null | cut -f1 || echo "unknown size"))"
                  # Prune backups older than 3 days (|| true: old root-owned dirs may not be deletable)
                  find /backup -maxdepth 1 -name "karakeep-*" -type d -mtime +3 -exec rm -rf {} + 2>/dev/null || true
                  echo "Current backups:"
                  ls -lh /backup/
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: 200m, memory: 256Mi }
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: backup
                  mountPath: /backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: karakeep-data
            - name: backup
              nfs:
                server: 10.10.30.4
                path: /Kubernetes/Backups/karakeep
