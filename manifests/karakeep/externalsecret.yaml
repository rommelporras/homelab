# ExternalSecret for Karakeep secrets
# Phase 4.29: Replaces manifests/karakeep/secret.yaml
#
# Vault path: secret/karakeep/secrets
# Creates K8s Secret: karakeep-secrets (2 keys via dataFrom.extract)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: karakeep-secrets
  namespace: karakeep
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: karakeep-secrets
  dataFrom:
    - extract:
        key: karakeep/secrets
