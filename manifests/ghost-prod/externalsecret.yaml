# ExternalSecrets for Ghost Prod
# Phase 4.29: Replaces manifests/ghost-prod/secret.yaml
#
# 1. ghost-mysql — Vault: secret/ghost-prod/mysql (2 keys)
# 2. ghost-mail — Vault: secret/ghost-prod/mail (4 keys)
# 3. ghost-tinybird — Vault: secret/ghost-prod/tinybird (4 keys)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghost-mysql
  namespace: ghost-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghost-mysql
  data:
    - secretKey: root-password
      remoteRef:
        key: ghost-prod/mysql
        property: root-password
    - secretKey: user-password
      remoteRef:
        key: ghost-prod/mysql
        property: user-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghost-mail
  namespace: ghost-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghost-mail
  data:
    - secretKey: smtp-host
      remoteRef:
        key: ghost-prod/mail
        property: smtp-host
    - secretKey: smtp-user
      remoteRef:
        key: ghost-prod/mail
        property: smtp-user
    - secretKey: smtp-password
      remoteRef:
        key: ghost-prod/mail
        property: smtp-password
    - secretKey: from-address
      remoteRef:
        key: ghost-prod/mail
        property: from-address
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghost-tinybird
  namespace: ghost-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghost-tinybird
  data:
    - secretKey: api-url
      remoteRef:
        key: ghost-prod/tinybird
        property: api-url
    - secretKey: admin-token
      remoteRef:
        key: ghost-prod/tinybird
        property: admin-token
    - secretKey: workspace-id
      remoteRef:
        key: ghost-prod/tinybird
        property: workspace-id
    - secretKey: tracker-token
      remoteRef:
        key: ghost-prod/tinybird
        property: tracker-token
