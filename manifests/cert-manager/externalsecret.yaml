# ExternalSecret for cert-manager Cloudflare API token
# Phase 4.29: Replaces imperative kubectl create secret
#
# Vault path: secret/cert-manager/cloudflare-api-token
# Creates K8s Secret: cloudflare-api-token (1 key: api-token)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
  data:
    - secretKey: api-token
      remoteRef:
        key: cert-manager/cloudflare-api-token
        property: api-token
