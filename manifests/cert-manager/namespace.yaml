# cert-manager namespace for TLS certificate management
# Phase 5.0 - Namespace & Pod Security
#
# PSS: enforce baseline (cert-manager controller needs baseline capabilities)
#      audit + warn restricted (guidance for future hardening)
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    eso-enabled: "true"
