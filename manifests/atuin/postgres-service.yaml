# PostgreSQL Service for Atuin
# ClusterIP — internal access only, Atuin server connects on port 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: atuin
  labels:
    app: postgres
    app.kubernetes.io/part-of: atuin
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
