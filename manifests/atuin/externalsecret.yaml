# ExternalSecret for Atuin secrets
# Phase 4.29: Replaces imperative kubectl create secret
#
# Vault path: secret/atuin/secrets
# Creates K8s Secret: atuin-secrets (4 keys via dataFrom.extract)
# Vault field names match K8s Secret key names exactly (POSTGRES_USER, etc.)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: atuin-secrets
  namespace: atuin
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: atuin-secrets
  dataFrom:
    - extract:
        key: atuin/secrets
