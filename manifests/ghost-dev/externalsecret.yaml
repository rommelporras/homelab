# ExternalSecrets for Ghost Dev
# Phase 4.29: Replaces manifests/ghost-dev/secret.yaml
#
# 1. ghost-mysql — Vault: secret/ghost-dev/mysql (2 keys)
# 2. ghost-mail — Vault: secret/ghost-dev/mail (4 keys)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghost-mysql
  namespace: ghost-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghost-mysql
  data:
    - secretKey: root-password
      remoteRef:
        key: ghost-dev/mysql
        property: root-password
    - secretKey: user-password
      remoteRef:
        key: ghost-dev/mysql
        property: user-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghost-mail
  namespace: ghost-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: ghost-mail
  data:
    - secretKey: smtp-host
      remoteRef:
        key: ghost-dev/mail
        property: smtp-host
    - secretKey: smtp-user
      remoteRef:
        key: ghost-dev/mail
        property: smtp-user
    - secretKey: smtp-password
      remoteRef:
        key: ghost-dev/mail
        property: smtp-password
    - secretKey: from-address
      remoteRef:
        key: ghost-dev/mail
        property: from-address
