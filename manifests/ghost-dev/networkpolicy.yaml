# CiliumNetworkPolicies for ghost-dev
# Pods: ghost (app=ghost, port 2368), ghost-mysql (app=ghost-mysql, port 3306)
# Pattern A: Web App + Database
# Default-deny enforced implicitly (ingress + egress policies cover both directions per pod)
---
# Ghost ingress: Gateway HTTPRoute + kubelet TCP probe on 2368
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ghost-gateway-ingress
  namespace: ghost-dev
spec:
  endpointSelector:
    matchLabels:
      app: ghost
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "2368"
              protocol: TCP
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "2368"
              protocol: TCP
---
# Ghost egress: DNS (with inspection for FQDN) + MySQL + SMTP
# DNS inspection rule MUST be in the same policy as toFQDNs rules
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ghost-egress
  namespace: ghost-dev
spec:
  endpointSelector:
    matchLabels:
      app: ghost
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
    - toEndpoints:
        - matchLabels:
            app: ghost-mysql
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
    - toFQDNs:
        - matchName: "smtp.mail.me.com"
      toPorts:
        - ports:
            - port: "587"
              protocol: TCP
---
# MySQL ingress: only ghost app can reach the database
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ghost-mysql-ingress
  namespace: ghost-dev
spec:
  endpointSelector:
    matchLabels:
      app: ghost-mysql
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: ghost
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
---
# MySQL egress: DNS only (exec probe - no kubelet network needed)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ghost-mysql-egress
  namespace: ghost-dev
spec:
  endpointSelector:
    matchLabels:
      app: ghost-mysql
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
