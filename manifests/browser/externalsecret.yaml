# ExternalSecret for Firefox browser basic auth
# Phase 4.29: Replaces imperative kubectl create secret
#
# Vault path: secret/browser/firefox-auth
# Creates K8s Secret: firefox-auth (2 keys: username, password)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: firefox-auth
  namespace: browser
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: firefox-auth
  data:
    - secretKey: username
      remoteRef:
        key: browser/firefox-auth
        property: username
    - secretKey: password
      remoteRef:
        key: browser/firefox-auth
        property: password
