# Cloudflare namespace for cloudflared tunnel
# Phase 5.0 - Namespace & Pod Security
#
# PSS: enforce restricted (cloudflared pods already comply with restricted profile)
#      audit + warn restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
    eso-enabled: "true"
