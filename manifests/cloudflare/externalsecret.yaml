# ExternalSecret for Cloudflare Tunnel token
# Phase 4.29: Replaces manifests/cloudflare/secret.yaml
#
# Vault path: secret/cloudflare/cloudflared-token
# Creates K8s Secret: cloudflared-token (1 key: token)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-token
  namespace: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflared-token
  data:
    - secretKey: token
      remoteRef:
        key: cloudflare/cloudflared-token
        property: token
