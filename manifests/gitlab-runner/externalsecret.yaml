# ExternalSecret for GitLab Runner token
# Phase 4.29: Replaces imperative kubectl create secret
#
# Vault path: secret/gitlab-runner/runner-token
# Creates K8s Secret: gitlab-runner-token (2 keys)
#   - runner-token: actual auth token from Vault (GitLab 17.0+ workflow)
#   - runner-registration-token: empty string (legacy key required by Helm chart
#     projected volume — chart expects both keys even when using new auth flow)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-token
    template:
      data:
        runner-token: "{{ .runnerToken }}"
        runner-registration-token: ""
  data:
    - secretKey: runnerToken
      remoteRef:
        key: gitlab-runner/runner-token
        property: runner-token
