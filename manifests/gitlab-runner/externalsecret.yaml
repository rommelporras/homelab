# ExternalSecret for GitLab Runner token
# Phase 4.29: Replaces imperative kubectl create secret
#
# Vault path: secret/gitlab-runner/runner-token
# Creates K8s Secret: gitlab-runner-token (1 key: runner-token)
# Note: legacy runner-registration-token key intentionally dropped
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-runner-token
  namespace: gitlab-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-runner-token
  data:
    - secretKey: runner-token
      remoteRef:
        key: gitlab-runner/runner-token
        property: runner-token
