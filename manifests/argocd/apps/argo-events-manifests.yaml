# ArgoCD Application: Argo Events custom manifests
# Companion to the argo-events Helm Application.
#
# Manages: namespace, limitrange, resourcequota, ciliumnetworkpolicy,
# eventbus, eventsources, sensors, httproute, servicemonitor, rbac,
# externalsecrets.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-events-manifests
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/rommelporras/homelab.git
    path: manifests/argo-events
    targetRevision: main
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-events
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
