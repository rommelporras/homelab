# ArgoCD Application: HashiCorp Vault (Helm)
# Wave 3 - Infrastructure Helm handover (high risk)
#
# Vault is a single-pod standalone with Raft storage on Longhorn.
# The Helm chart manages the StatefulSet, Service, and ServiceAccount.
# Custom manifests (unsealer, ClusterSecretStore, HTTPRoute, etc.) are
# in manifests/vault/ and managed by a separate Git-type Application.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: infrastructure
  sources:
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: "0.32.0"
      helm:
        valueFiles:
          - $values/helm/vault/values.yaml
    - repoURL: https://github.com/rommelporras/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
