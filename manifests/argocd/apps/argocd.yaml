# ArgoCD Application: ArgoCD self-management (Helm)
# Phase 5.8.7.1 - Self-management handover
#
# ArgoCD manages its own Helm chart. This is the last Helm release
# to hand over. After this, all services are declaratively managed.
# selfHeal ensures ArgoCD recovers from manual changes.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: argocd-self
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: "9.4.16"
      helm:
        valueFiles:
          - $values/helm/argocd/values.yaml
    - repoURL: https://github.com/rommelporras/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  # argocd-secret is patched by ESO (manifests/argocd/externalsecret.yaml) via
  # creationPolicy:Merge which adds admin.password + server.secretkey from Vault.
  # ArgoCD would otherwise flag the merged fields as OutOfSync vs Helm's template.
  ignoreDifferences:
    - kind: Secret
      name: argocd-secret
      jqPathExpressions:
        - .data
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
    automated:
      prune: true
      selfHeal: true
