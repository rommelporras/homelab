# ArgoCD Application: Invoicetron Dev
# Phase 5.9.1 - ArgoCD onboarding via Kustomize overlays
#
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: invoicetron-dev
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: cicd-apps
  source:
    repoURL: https://github.com/rommelporras/homelab.git
    targetRevision: main
    path: manifests/invoicetron/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: invoicetron-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
