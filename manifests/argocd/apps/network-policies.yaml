# ArgoCD Application: Network Policies (cluster-wide)
# Wave 2 - CiliumClusterwideNetworkPolicy resources
#
# These are cluster-scoped policies (not namespace-scoped CiliumNetworkPolicy).
# Currently contains: gateway-clusterwide-policy.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/rommelporras/homelab.git
    path: manifests/network-policies
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
