# ArgoCD Application: Atuin
# Wave 1 - Simple manifest service
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atuin
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: homelab-apps
  source:
    repoURL: https://github.com/rommelporras/homelab.git
    path: manifests/atuin
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: atuin
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
