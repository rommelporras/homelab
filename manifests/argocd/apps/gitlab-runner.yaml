# ArgoCD Application: GitLab Runner (Helm)
# Wave 5 - GitLab CI/CD executor handover
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-runner
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: gitlab
  sources:
    - repoURL: https://charts.gitlab.io
      chart: gitlab-runner
      targetRevision: "0.85.0"
      helm:
        valueFiles:
          - $values/helm/gitlab-runner/values.yaml
    - repoURL: https://github.com/rommelporras/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: gitlab-runner
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
