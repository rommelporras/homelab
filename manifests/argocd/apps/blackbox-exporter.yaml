# ArgoCD Application: Blackbox Exporter (Helm)
# Wave 4 - Monitoring Helm handover (low risk)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blackbox-exporter
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: infrastructure
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-blackbox-exporter
      targetRevision: "11.7.0"
      helm:
        valueFiles:
          - $values/helm/blackbox-exporter/values.yaml
    - repoURL: https://github.com/rommelporras/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
