# ArgoCD Application: Velero custom manifests
# Companion to the velero Helm Application
#
# Manages: Garage S3, backup schedules, ExternalSecrets, namespace,
# LimitRange, ResourceQuota, CNP
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero-manifests
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/rommelporras/homelab.git
    path: manifests/velero
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
