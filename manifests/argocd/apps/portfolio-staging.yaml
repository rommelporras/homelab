# ArgoCD Application: Portfolio Staging
# Phase 5.9.1 - ArgoCD onboarding via Kustomize overlays
#
# syncPolicy.automated intentionally omitted — enable after verifying zero diff at first sync
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-staging
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: cicd-apps
  source:
    repoURL: https://github.com/rommelporras/homelab.git
    targetRevision: main
    path: manifests/portfolio/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio-staging
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
