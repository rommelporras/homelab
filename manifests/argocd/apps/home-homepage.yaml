# ArgoCD Application: Homepage
# Wave 2 - Complex manifest service (home namespace, Kustomize)
#
# ArgoCD auto-detects kustomization.yaml in the path and uses
# kustomize build instead of plain manifest apply.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-homepage
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.discord: ""
    notifications.argoproj.io/subscribe.on-sync-failed.discord: ""
spec:
  project: homelab-apps
  source:
    repoURL: https://github.com/rommelporras/homelab.git
    path: manifests/home/homepage
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: home
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
    automated:
      prune: true
      selfHeal: true
