# ExternalSecrets for ArgoCD
# Phase 5.7: ArgoCD Installation & Bootstrap
#
# 1. argocd-vault-secrets — Vault: secret/argocd (admin-password, server-secret-key)
#    Merge into argocd-secret created by Helm chart
# 2. argocd-notifications-secret — Vault: secret/argocd (discord-webhook-url)
#
# No repo credentials needed - homelab repo is public on GitHub.
# ArgoCD clones public repos without authentication.
#
# Ordering: Apply BEFORE Helm install. argocd-vault-secrets uses creationPolicy: Merge
# which patches argocd-secret after Helm creates it. ESO retries automatically.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-vault-secrets
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: admin.password
      remoteRef:
        key: argocd
        property: admin-password
    - secretKey: server.secretkey
      remoteRef:
        key: argocd
        property: server-secret-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
  data:
    - secretKey: discord-webhook-url
      remoteRef:
        key: argocd
        property: discord-webhook-url
