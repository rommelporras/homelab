# manifests/argo-workflows/limitrange.yaml
# Default resource requests/limits for pods that do not set them explicitly.
# Every workflow step pod (argoexec sidecar + user container) will inherit
# these if the WorkflowTemplate leaves resources unset.
---
apiVersion: v1
kind: LimitRange
metadata:
  name: argo-workflows-defaults
  namespace: argo-workflows
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 6Gi        # bumped 2Gi -> 6Gi for invoicetron BuildKit:
                           # Next.js 16 Turbopack + Prisma + native
                           # canvas peak well past 4Gi during
                           # production compile (smoke46 OOM at 4Gi).
                           # Fits in namespace 10Gi with build running
                           # serially after the parallel test layer.
      min:
        cpu: 10m
        memory: 32Mi
