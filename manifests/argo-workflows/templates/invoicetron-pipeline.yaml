# manifests/argo-workflows/templates/invoicetron-pipeline.yaml
# Invoicetron CI/CD pipeline WorkflowTemplate (Phase 5.9.1 Stage 2).
#
# DAG:
#
#                                  +-- lint ---------+
#   clone --- install-deps -------+--- type-check ---+--- build --- push --- migrate --- deploy --- verify
#                                  +-- test:unit ----+
#                                      (parallel)
#
# Push is a separate skopeo step because BuildKit v0.29.0 has a 403
# issue against this cluster's GitLab registry JWT auth; skopeo
# handles it cleanly. See Phase 5.9.1 Execution Note #28.
# migrate pulls the just-pushed image, so it must depend on push
# rather than build.
#
#   onExit: notify-on-failure
#
# Triggered by Sensor `gitlab-invoicetron-develop` or `-main`.
#
# Differences vs. portfolio-pipeline:
#   - no E2E step
#   - test-unit runs on node:22-slim (Vitest SSR is unreliable on bun)
#   - install-deps runs `bunx prisma generate` (extra_command) so
#     type-check sees @prisma/client - bundled into install instead of
#     prefixed onto type-check's command (avoids races on shared
#     workspace, see portfolio-pipeline note)
#   - build passes NEXT_PUBLIC_APP_URL as a build-arg per environment
#     (baked into the Next.js bundle at build time)
#   - dedicated `migrate` step between build and deploy runs
#     `bunx prisma migrate deploy` against the target DB using the
#     just-built image and DATABASE_URL from Vault
#   - image_repo includes the `/dev` or `/prod` sub-path (from Sensor)
#   - deploy uses `image_name=app` to hit the Kustomize `newName` entry
#
# Volumes: workspace + ssh-key + buildkit-home (same as portfolio).
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: invoicetron-pipeline
  namespace: argo-workflows
spec:
  entrypoint: invoicetron-dag
  serviceAccountName: ci-workflow-sa
  activeDeadlineSeconds: 1800
  onExit: notify-on-failure
  ttlStrategy:
    secondsAfterSuccess: 86400
    secondsAfterFailure: 604800
    secondsAfterCompletion: 604800
  podGC:
    strategy: OnPodSuccess
  podMetadata:
    labels:
      app.kubernetes.io/component: ci-pipeline
      app.kubernetes.io/name: invoicetron
  # See portfolio-pipeline for fsGroup rationale (workspace PVC mount
  # chown so bun/node containers running as UID 1000 can write).
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  arguments:
    parameters:
      - name: commit_sha
      - name: branch
      - name: environment
      - name: image_repo
  # imagePullSecrets belongs at the workflow spec level (not per-template
  # in v4.0.4 - schema rejects it under .spec.templates[].imagePullSecrets).
  # Applied to every step pod; BuildKit and deploy steps don't actually
  # need it (they pull alpine/git, moby/buildkit from public registries)
  # but the migrate step pulls the freshly-built app image from the
  # private GitLab registry, so the pull secret is required.
  imagePullSecrets:
    - name: gitlab-registry
  # See portfolio-pipeline for why volumeClaimTemplates instead of emptyDir.
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
  volumes:
    - name: ssh-key
      secret:
        secretName: github-deploy-key
        defaultMode: 0400
    - name: buildkit-home
      secret:
        secretName: gitlab-registry
        items:
          - key: .dockerconfigjson
            path: config.json
        defaultMode: 0400
    # GitLab group deploy token (read_repository) for private-repo
    # clone. Consumed by the shared clone template's credential
    # helper setup.
    - name: git-creds
      secret:
        secretName: gitlab-clone-token
        defaultMode: 0400
    # Writable /var/tmp for push-image (skopeo extracts the OCI archive
    # there; readOnlyRootFilesystem blocks in-rootfs writes).
    - name: tmp
      emptyDir: {}
  templates:
    # --- entrypoint DAG ---
    - name: invoicetron-dag
      dag:
        tasks:
          - name: clone
            templateRef:
              name: clone
              template: clone
            arguments:
              parameters:
                - name: repo_url
                  value: https://gitlab.k8s.rommelporras.com/0xwsh/invoicetron.git
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: commit_sha
                  value: "{{workflow.parameters.commit_sha}}"
          - name: install-deps
            dependencies: [clone]
            templateRef:
              name: install-deps
              template: install-deps
            arguments:
              parameters:
                # Two constraints driving this image pin:
                # 1) Prisma 6.x rejects Node <20.19/<22.12/<24.0. Bun
                #    1.2.15 reports process.versions.node=22.6.0 (fails);
                #    bun 1.2.20+ reports 24.3.0 (passes).
                # 2) `canvas` npm package has no prebuilt binary for
                #    musl/alpine (target=7 runtime=napi libc=musl), so
                #    install triggers node-gyp which needs python +
                #    build tools not present in -alpine. Glibc
                #    (-slim, debian) has a published prebuilt.
                # oven/bun:1.2.20-slim satisfies both. Pin scoped to
                # invoicetron; Portfolio stays on 1.2.15-alpine.
                - name: image
                  value: oven/bun:1.2.20-slim
                # Prisma 7.x config loader resolves process.env inside
                # prisma.config.ts up front and errors if DATABASE_URL
                # is unset, even for `generate` (which never opens a DB
                # connection). A syntactically-valid dummy URL
                # satisfies the loader without exposing real creds to
                # the install step; the real URL lives in the migrate
                # step via Vault+ESO.
                - name: extra_command
                  value: "DATABASE_URL='postgresql://placeholder:placeholder@127.0.0.1:5432/placeholder' bunx prisma generate"
          - name: lint
            dependencies: [install-deps]
            templateRef:
              name: lint
              template: lint
          - name: type-check
            dependencies: [install-deps]
            templateRef:
              name: type-check
              template: type-check
          - name: test-unit
            dependencies: [install-deps]
            templateRef:
              name: test-unit
              template: test-unit
            arguments:
              parameters:
                - name: image
                  value: node:22-slim
                # Same EACCES workaround as portfolio-pipeline test-unit:
                # node:22-slim runs as UID 1000, /usr/local is root-owned,
                # so npm -g must redirect to a writable prefix.
                - name: command
                  value: "npm install --prefix /tmp/npm-global -g bun && /tmp/npm-global/bin/bun run test:unit"
          - name: build
            # app-url-dispatch is listed here (not just in the parallel
            # layer) because build consumes its `result` output via
            # {{tasks.app-url-dispatch.outputs.result}} - Argo's DAG
            # resolver only propagates task outputs through explicit
            # dependency edges.
            dependencies: [lint, type-check, test-unit, app-url-dispatch]
            templateRef:
              name: build-image
              template: build-image
            arguments:
              parameters:
                - name: image_repo
                  value: "{{workflow.parameters.image_repo}}"
                - name: tag
                  value: "{{workflow.parameters.commit_sha}}"
                - name: build_args
                  value: "NEXT_PUBLIC_APP_URL={{tasks.app-url-dispatch.outputs.result}}"
          - name: app-url-dispatch
            template: app-url-dispatch
            arguments:
              parameters:
                - name: environment
                  value: "{{workflow.parameters.environment}}"
          - name: push
            dependencies: [build]
            templateRef:
              name: push-image
              template: push-image
            arguments:
              parameters:
                - name: image_repo
                  value: "{{workflow.parameters.image_repo}}"
                - name: tag
                  value: "{{workflow.parameters.commit_sha}}"
          - name: migrate
            dependencies: [push]
            template: migrate
            arguments:
              parameters:
                - name: image_repo
                  value: "{{workflow.parameters.image_repo}}"
                - name: image_tag
                  value: "{{workflow.parameters.commit_sha}}"
                - name: environment
                  value: "{{workflow.parameters.environment}}"
          - name: deploy
            dependencies: [migrate]
            templateRef:
              name: deploy-image
              template: deploy-image
            arguments:
              parameters:
                - name: project
                  value: invoicetron
                - name: environment
                  value: "{{workflow.parameters.environment}}"
                - name: image_repo
                  value: "{{workflow.parameters.image_repo}}"
                - name: image_tag
                  value: "{{workflow.parameters.commit_sha}}"
                - name: overlay_path
                  value: "manifests/invoicetron/overlays/{{workflow.parameters.environment}}"
                - name: image_name
                  value: app
          - name: verify
            dependencies: [deploy]
            template: verify-dispatch
            arguments:
              parameters:
                - name: environment
                  value: "{{workflow.parameters.environment}}"

    # --- app URL dispatch: picks build-arg per environment ---
    # Output is consumed by build's build_args parameter.
    - name: app-url-dispatch
      inputs:
        parameters:
          - name: environment
      script:
        image: alpine/k8s:1.35.3
        command: [sh]
        source: |
          set -e
          case "{{inputs.parameters.environment}}" in
            dev)  echo -n "https://invoicetron.dev.k8s.rommelporras.com" ;;
            prod) echo -n "https://invoicetron.rommelporras.com" ;;
            *) echo "unknown environment: {{inputs.parameters.environment}}" >&2; exit 1 ;;
          esac
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]

    # --- migrate: prisma migrate deploy against env DB ---
    # Argo Workflows v4.0.4 does NOT honor a template-level
    # `metadata.labels` override of a key already set by
    # workflow-level `podMetadata.labels` - the workflow label wins
    # at pod-creation time (verified empirically on smoke54: pod
    # kept `app.kubernetes.io/component=ci-pipeline` despite the
    # template override). Using a DIFFERENT key (`invoicetron-migrate`)
    # works around the quirk and lets the cross-namespace DB CNP
    # (invoicetron-<env>-db-ingress) pick this pod specifically.
    - name: migrate
      metadata:
        labels:
          invoicetron-migrate: "true"
      inputs:
        parameters:
          - name: image_repo
          - name: image_tag
          - name: environment
      container:
        image: "{{inputs.parameters.image_repo}}:{{inputs.parameters.image_tag}}"
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            echo "=== Prisma migrate deploy ({{inputs.parameters.environment}}) ==="
            cd /app
            bunx prisma migrate deploy
        env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: invoicetron-migrate-db-urls
                key: "{{inputs.parameters.environment}}"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]

    # --- verify dispatch: picks the right URL per environment ---
    - name: verify-dispatch
      inputs:
        parameters:
          - name: environment
      steps:
        - - name: dev
            when: "{{inputs.parameters.environment}} == dev"
            templateRef:
              name: verify-health
              template: verify-health
            arguments:
              parameters:
                - name: url
                  value: https://invoicetron.dev.k8s.rommelporras.com/
          - name: prod
            when: "{{inputs.parameters.environment}} == prod"
            templateRef:
              name: verify-health
              template: verify-health
            arguments:
              parameters:
                - name: url
                  value: https://invoicetron.k8s.rommelporras.com/

    # --- exit handler ---
    - name: notify-on-failure
      steps:
        - - name: delegate
            templateRef:
              name: notify-on-failure
              template: notify-on-failure
