# manifests/argo-workflows/templates/build-image-template.yaml
# Shared BuildKit rootless image BUILD step (push lives in
# push-image-template.yaml - see Phase 5.9.1 Execution Note #28 for
# why the push path pivoted to skopeo).
#
# Replaces GitLab CI's DinD-based `docker buildx build`. Kaniko was
# archived in June 2025, so BuildKit is the current consensus for
# daemonless in-cluster builds.
#
# Output: OCI archive at /workspace/image.tar. The downstream
# `push-image` step copies it to the registry via skopeo.
#
# Registry cache: omitted. BuildKit v0.29.0 has a known 403 issue
# against this cluster's GitLab registry JWT flow, so registry-backed
# inline cache can't be used here either. For a single-app homelab
# build this costs ~10s on no-op changes; accept the tradeoff.
#
# Parameters:
#   image_repo       e.g. registry.k8s.rommelporras.com/0xwsh/portfolio
#   tag              commit_sha (8 chars) - used only to label the
#                    image inside the OCI archive; push step uses the
#                    same ref when copying to the registry
#   dockerfile_path  e.g. Dockerfile
#   build_args       optional newline-separated KEY=VALUE string
#                    (e.g. "NEXT_PUBLIC_APP_URL=https://dev.example.com")
#
# Security: UID 1000 + rootlesskit user-namespace isolation (the
# `-rootless` image variant). The namespace is labeled
# `pod-security.kubernetes.io/enforce: privileged` specifically so
# BuildKit can set `seccompProfile: Unconfined` (baseline PSS
# explicitly prohibits that value, even though everyone reaches for it
# first; smoke10 admission rejection, 2026-04-19). All other CI
# templates in this namespace voluntarily keep baseline-compatible
# securityContext blocks - the relaxation is scoped to this one
# container.
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-image
  namespace: argo-workflows
spec:
  templates:
    - name: build-image
      inputs:
        parameters:
          - name: image_repo
          - name: tag
          - name: dockerfile_path
            value: Dockerfile
          - name: build_args
            value: ""
      container:
        image: moby/buildkit:v0.29.0-rootless
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            cd /workspace
            echo "=== BuildKit build + push ==="
            echo "  image: {{inputs.parameters.image_repo}}:{{inputs.parameters.tag}}"
            echo "  dockerfile: {{inputs.parameters.dockerfile_path}}"

            # Render build args from the newline-separated parameter into
            # repeated --opt build-arg:KEY=VALUE flags.
            BUILD_ARG_FLAGS=""
            if [ -n "{{inputs.parameters.build_args}}" ]; then
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                BUILD_ARG_FLAGS="$BUILD_ARG_FLAGS --opt build-arg:$line"
              done <<EOF
            {{inputs.parameters.build_args}}
            EOF
            fi

            # Start rootlesskit-backed buildkitd and run buildctl build.
            # The -rootless image provides buildctl-daemonless.sh.
            #
            # `type=oci,dest=/workspace/image.tar` writes an OCI image
            # archive to the shared workspace PVC. The next DAG node
            # (push-image) reads this file and skopeo-copies it to the
            # registry. See Phase 5.9.1 Execution Note #28.
            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context=/workspace \
              --local dockerfile=/workspace \
              --opt filename={{inputs.parameters.dockerfile_path}} \
              $BUILD_ARG_FLAGS \
              --output type=oci,dest=/workspace/image.tar,name={{inputs.parameters.image_repo}}:{{inputs.parameters.tag}}

            echo "=== OCI archive written ==="
            ls -lh /workspace/image.tar
        env:
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
          - name: DOCKER_CONFIG
            value: /home/user/.docker
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          # allowPrivilegeEscalation MUST be true (smoke13/14):
          # rootlesskit exec's the setuid-root `newuidmap`/`newgidmap`
          # helpers to build its user-namespace UID/GID map. Setting
          # false would apply NO_NEW_PRIVS and block setuid elevation.
          allowPrivilegeEscalation: true
          # BuildKit rootless needs Unconfined seccomp for CLONE_NEWUSER
          # + unshare. Enabled via the argo-workflows namespace PSS
          # override (enforce=privileged, see namespace.yaml +
          # Security.md "Privileged Justifications").
          seccompProfile:
            type: Unconfined
          # Capabilities story (smoke13/14/15):
          # - Don't drop:[ALL] - it clears the bounding set and blocks
          #   setuid exec of newuidmap (SETUID/SETGID default caps are
          #   needed to call setresuid() post-exec).
          # - Add SYS_ADMIN - rootlesskit's first steps inside its user
          #   namespace call `mount --make-rprivate /` to isolate the
          #   mount namespace. That needs CAP_SYS_ADMIN; without it
          #   rootlesskit errors with
          #     [rootlesskit:child ] error: failed to share mount
          #     point: /: permission denied
          # PSS=privileged accepts SYS_ADMIN; kernel constrains it to
          # this pod's user namespace in practice.
          capabilities:
            add: ["SYS_ADMIN"]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
