# manifests/argo-workflows/templates/portfolio-pipeline.yaml
# Portfolio CI/CD pipeline WorkflowTemplate (Phase 5.9.1 Stage 2).
#
# DAG (all step images come from shared templates):
#
#                              +-- lint -------+
#   clone --- install-deps ---+--- type-check -+--- build --- deploy --- verify
#                              +-- test:unit --+
#                                  (parallel)
#
# install-deps runs `bun install --frozen-lockfile` ONCE against the
# shared workspace before fanning out. Inlining install into each
# parallel step caused 3 pods to race on the same node_modules and
# crash Bun with a segfault (smoke6, 2026-04-19).
#
#   onExit: notify-on-failure (Discord #incidents)
#
# NOTE: test-e2e (Playwright) deferred per docs/todo/deferred.md —
# the template exists but is not wired into the DAG until the
# Playwright image + out/ build orchestration is sorted out.
#
# Triggered by Sensor `gitlab-portfolio-develop` or
# `gitlab-portfolio-main`. Staging is NOT triggered here; see
# portfolio-staging-promote.yaml for that path.
#
# Parameters (provided by the Sensor on Workflow creation):
#   commit_sha   8-char SHA (DR-2)
#   branch       develop | main
#   environment  dev | prod
#   image_repo   registry.k8s.rommelporras.com/0xwsh/portfolio
#
# Volumes declared at workflow level because Argo does not propagate
# volumes across templateRef boundaries:
#   - workspace    emptyDir shared by clone/lint/type-check/test/build
#   - ssh-key      Secret (github-deploy-key) mounted only by deploy
#   - buildkit-home Secret (gitlab-registry) mounted only by build
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: portfolio-pipeline
  namespace: argo-workflows
spec:
  entrypoint: portfolio-dag
  serviceAccountName: ci-workflow-sa
  activeDeadlineSeconds: 1800
  onExit: notify-on-failure
  ttlStrategy:
    secondsAfterSuccess: 86400    # 1 day
    secondsAfterFailure: 604800   # 7 days
    secondsAfterCompletion: 604800
  podGC:
    strategy: OnPodSuccess
  podMetadata:
    labels:
      app.kubernetes.io/component: ci-pipeline
      app.kubernetes.io/name: portfolio
  # fsGroup=1000 forces kubelet to chown the workspace PVC mount point
  # to group 1000 on first mount. Without it the Longhorn volume is
  # root:root 0755 by default, the clone step (runs as root in
  # alpine/git) writes the repo in, then lint/type-check/test-unit
  # (UID 1000 from oven/bun:*-alpine) hit
  #   EACCES: Permission denied: could not create the "node_modules" directory
  # OnRootMismatch skips the chown walk on subsequent mounts where the
  # root already has group 1000 - matters for large workspaces.
  securityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  arguments:
    parameters:
      - name: commit_sha
      - name: branch
      - name: environment
      - name: image_repo
  # emptyDir was the plan's original choice but does not actually share
  # data between step pods - each pod gets its own empty volume.
  # volumeClaimTemplates creates a single PVC per workflow run that all
  # step pods mount; Argo pins all pods to the same node so a Longhorn
  # RWO volume works. Deleted automatically when the workflow completes.
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: longhorn
        resources:
          requests:
            storage: 2Gi
  volumes:
    - name: ssh-key
      secret:
        secretName: github-deploy-key
        defaultMode: 0400
    - name: buildkit-home
      secret:
        secretName: gitlab-registry
        items:
          - key: .dockerconfigjson
            path: config.json
        defaultMode: 0400
  templates:
    # --- entrypoint DAG ---
    - name: portfolio-dag
      dag:
        tasks:
          - name: clone
            templateRef:
              name: clone
              template: clone
            arguments:
              parameters:
                - name: repo_url
                  value: https://gitlab.k8s.rommelporras.com/0xwsh/portfolio.git
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: commit_sha
                  value: "{{workflow.parameters.commit_sha}}"
          - name: install-deps
            dependencies: [clone]
            templateRef:
              name: install-deps
              template: install-deps
          - name: lint
            dependencies: [install-deps]
            templateRef:
              name: lint
              template: lint
          - name: type-check
            dependencies: [install-deps]
            templateRef:
              name: type-check
              template: type-check
          - name: test-unit
            dependencies: [install-deps]
            templateRef:
              name: test-unit
              template: test-unit
            arguments:
              parameters:
                # Vitest + JSDOM crashes on bun 1.2.15 with
                # `vm_context_no_contextify` symbol incompatibility
                # (smoke7, 2026-04-19). Same workaround invoicetron
                # uses: run on node:22-slim, install bun globally just
                # to act as the script runner against the already
                # populated node_modules from install-deps.
                #
                # `npm install -g` goes to /usr/local which is root-
                # owned in node:22-slim; the container runs as UID 1000
                # so the install fails with EACCES (smoke9). Redirect
                # npm's prefix to /tmp/npm-global (world-writable, on
                # the pod's tmpfs so it dies with the pod) and add it
                # to PATH for the subsequent bun call.
                - name: image
                  value: node:22-slim
                - name: command
                  value: "npm install --prefix /tmp/npm-global -g bun && /tmp/npm-global/bin/bun run test:unit"
          - name: build
            dependencies: [lint, type-check, test-unit]
            templateRef:
              name: build-image
              template: build-image
            arguments:
              parameters:
                - name: image_repo
                  value: "{{workflow.parameters.image_repo}}"
                - name: tag
                  value: "{{workflow.parameters.commit_sha}}"
          - name: deploy
            dependencies: [build]
            templateRef:
              name: deploy-image
              template: deploy-image
            arguments:
              parameters:
                - name: project
                  value: portfolio
                - name: environment
                  value: "{{workflow.parameters.environment}}"
                - name: image_repo
                  value: "{{workflow.parameters.image_repo}}"
                - name: image_tag
                  value: "{{workflow.parameters.commit_sha}}"
                - name: overlay_path
                  value: "manifests/portfolio/overlays/{{workflow.parameters.environment}}"
                - name: image_name
                  value: "registry.k8s.rommelporras.com/0xwsh/portfolio"
          - name: verify
            dependencies: [deploy]
            template: verify-dispatch
            arguments:
              parameters:
                - name: environment
                  value: "{{workflow.parameters.environment}}"

    # --- verify dispatch: picks the right URL per environment ---
    # verify-health is shared but takes a fixed URL; a thin dispatcher
    # avoids per-env branching in the DAG above.
    - name: verify-dispatch
      inputs:
        parameters:
          - name: environment
      steps:
        - - name: dev
            when: "{{inputs.parameters.environment}} == dev"
            templateRef:
              name: verify-health
              template: verify-health
            arguments:
              parameters:
                - name: url
                  value: https://portfolio.dev.k8s.rommelporras.com/
          - name: prod
            when: "{{inputs.parameters.environment}} == prod"
            templateRef:
              name: verify-health
              template: verify-health
            arguments:
              parameters:
                - name: url
                  value: https://portfolio.k8s.rommelporras.com/

    # --- exit handler: delegate to shared notify-on-failure ---
    - name: notify-on-failure
      steps:
        - - name: delegate
            templateRef:
              name: notify-on-failure
              template: notify-on-failure
