# manifests/argo-workflows/templates/clone-template.yaml
# Shared clone step. Checks out `commit_sha` from a repo URL into
# /workspace (shared RWO volume within a single workflow).
#
# Auth:
# - Public repos (portfolio on github.com) clone without credentials.
# - Private GitLab repos (invoicetron) authenticate with a group-level
#   deploy token (scope: read_repository) from Secret `gitlab-clone-token`
#   (ExternalSecret in this namespace). The Secret is mounted on every
#   call; the clone script configures a git `store` credential helper
#   against /workspace/.git-credentials when the Secret is present, so
#   the token never appears in process args or the commit URL.
# - Write access for `deploy-image` uses the SSH deploy key on a
#   separate path and is unrelated to clone auth.
#
# Parameters:
#   repo_url    full HTTPS clone URL
#   branch      required - servers only accept branch/tag/full-SHA refs,
#               not 8-char short SHAs; fetch branch then checkout SHA
#   commit_sha  8-char SHA (DR-2)
#
# Shared volume contract: caller MUST provide a `workspace` volume
# mounted at /workspace on every step that reads the working copy
# (lint, type-check, test, build, deploy).
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: clone
  namespace: argo-workflows
spec:
  templates:
    - name: clone
      inputs:
        parameters:
          - name: repo_url
          - name: branch
          - name: commit_sha
      container:
        image: alpine/git:2.52.0
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            echo "=== Clone {{inputs.parameters.repo_url}} branch={{inputs.parameters.branch}} sha={{inputs.parameters.commit_sha}} ==="

            # If a GitLab clone-token Secret is mounted, configure a
            # store credential helper so HTTPS auth works without
            # putting the token in the clone URL or process args.
            # Public-repo pipelines (portfolio/github.com) ignore the
            # helper - git only consults it when the server prompts
            # for credentials.
            if [ -f /git-creds/username ] && [ -f /git-creds/password ]; then
              U=$(cat /git-creds/username)
              P=$(cat /git-creds/password)
              # Derive host from repo_url: strip scheme + path/slash.
              HOST=$(echo "{{inputs.parameters.repo_url}}" | sed -E 's#^https?://##; s#/.*##')
              umask 077
              printf 'https://%s:%s@%s\n' "$U" "$P" "$HOST" > /workspace/.git-credentials
              git config --global credential.helper "store --file=/workspace/.git-credentials"
              unset U P
            fi

            cd /workspace
            git init
            git remote add origin "{{inputs.parameters.repo_url}}"
            # Fetch the last 50 commits on the branch - enough depth
            # to find the short SHA without a full-history clone.
            # `git fetch origin <8-char-sha>` fails with "couldn't find
            # remote ref <sha>" because git wire protocol only accepts
            # branch/tag/full-SHA refs. Fetch by branch, then resolve
            # the short SHA locally via `git checkout`.
            git fetch --depth=50 origin "{{inputs.parameters.branch}}"
            git checkout "{{inputs.parameters.commit_sha}}"
            echo "=== Tree: ==="
            ls -la
        env:
          - name: GIT_CONFIG_GLOBAL
            value: /workspace/.gitconfig
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: git-creds
            mountPath: /git-creds
            readOnly: true
