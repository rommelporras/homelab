# manifests/argo-workflows/ciliumnetworkpolicy-ci-pipelines.yaml
# Egress policies for CI pipeline pods (clone/lint/test/build/deploy/
# verify + invoicetron migrate). Kept in a separate file from the
# Phase 5.9 controller/vault-snapshot CNP to keep migration diffs
# reviewable.
#
# Pod selection: workflow pods get app.kubernetes.io/component=
# ci-pipeline from the pipeline WorkflowTemplate's `podMetadata`.
# The invoicetron migrate step overrides that to `invoicetron-migrate`
# via `metadata` on its template.
#
# Egress catalogue:
#   clone       GitLab clone HTTPS (gitlab.k8s.rommelporras.com:8181)
#   test:e2e    none extra (tests run against local dev server)
#   build       GitLab registry push (registry.k8s.rommelporras.com:443)
#   deploy      GitHub SSH (github.com:22)
#   verify      app health HTTPS (*.k8s.rommelporras.com:443 +
#               rommelporras.com:443 for prod)
#   migrate     invoicetron-<env> PostgreSQL:5432
#   all         DNS + kube-apiserver (argoexec)
#
# toFQDNs require a paired DNS egress rule (CLAUDE.md gotcha). The
# catch-all DNS rule below covers that for every matchPattern used.

# ============================================================
# ci-pipeline pods (all steps except migrate)
# ============================================================
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argo-workflows-ci-pipeline
  namespace: argo-workflows
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: ci-pipeline
  egress:
    # DNS (also populates FQDN -> IP cache for toFQDNs below)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    # argoexec -> kube-apiserver (WorkflowTaskResult) + to controller
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: workflow-controller
            k8s:io.kubernetes.pod.namespace: argo-workflows
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # GitLab clone + registry push (in-cluster gitlab namespace,
    # webservice listens on 8181 so this is kept explicit rather than
    # relying on the world:443 rule - Cilium Gateway terminates TLS
    # and forwards on 8181 inside the cluster).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: gitlab
            app: webservice
      toPorts:
        - ports:
            - port: "8181"
              protocol: TCP
    # GitHub SSH for deploy step (deploy-image git push).
    - toFQDNs:
        - matchName: github.com
      toPorts:
        - ports:
            - port: "22"
              protocol: TCP
    # Broad HTTPS egress for CI-typical dependency fetches.
    #
    # Initial design enumerated each FQDN (registry.npmjs.org, docker.io,
    # deb.debian.org, dl-cdn.alpinelinux.org, mcr.microsoft.com,
    # playwright.download.prss.microsoft.com, github.com:443, etc.)
    # but that list is effectively unbounded for a generic CI pipeline
    # - every bun install / apt-get / apk add / curl release tarball
    # would require another CNP edit.
    #
    # Opening HTTPS to the world is the standard pattern for CI
    # workloads (GitHub Actions, GitLab runners, CircleCI all do this
    # implicitly). CI pipeline code is trusted - it comes from our
    # own GitLab repos running our own WorkflowTemplates under
    # ci-workflow-sa which has a narrow Secret get allowlist.
    # Non-HTTPS egress stays tight: DNS + kube-apiserver + in-cluster
    # NATS/GitLab + SSH to github.com only.
    #
    # host/remote-node/ingress: the cluster's HTTPRoute-exposed
    # endpoints (registry.k8s.rommelporras.com,
    # portfolio.{dev,stg}.k8s...., invoicetron.dev.k8s....) resolve to
    # kube-vip VIP 10.10.30.20 which fronts the Cilium Gateway. Egress
    # from a ci-pipeline pod to that VIP lands on the Gateway envoy
    # proxy, whose Cilium identity is `reserved:ingress` - NOT `world`
    # (and not host/remote-node either; those are the kube-vip hosts
    # themselves, but the gateway proxy pod owns the identity).
    # Without `ingress` the push step's skopeo/registry traffic drops
    # at the CNP (surfacing as a 403 "Access denied" on the blob-reuse
    # mount path, smoke28/29). Verify-health hits the same path to
    # portfolio.dev.k8s.rommelporras.com.
    - toEntities:
        - world
        - host
        - remote-node
        - ingress
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

# ============================================================
# invoicetron-migrate pods (egress to invoicetron-<env> DB)
# ============================================================
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argo-workflows-invoicetron-migrate
  namespace: argo-workflows
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: invoicetron-migrate
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"
    # argoexec
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: workflow-controller
            k8s:io.kubernetes.pod.namespace: argo-workflows
      toPorts:
        - ports:
            - port: "9090"
              protocol: TCP
    # Cross-namespace PostgreSQL to invoicetron-<env>/invoicetron-db
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: invoicetron-dev
            app: invoicetron-db
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: invoicetron-prod
            app: invoicetron-db
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
