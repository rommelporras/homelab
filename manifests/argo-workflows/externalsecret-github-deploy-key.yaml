# manifests/argo-workflows/externalsecret-github-deploy-key.yaml
# SSH deploy key (DR-5) for the homelab GitHub repo. Mounted by the
# deploy-image WorkflowTemplate only - the build pod never sees it.
#
# Source: Vault argo-workflows/github-deploy-key with ssh-privatekey
# field (seeded from 1P item "Argo Workflows CI/CD"). The matching
# public key is registered on rommelporras/homelab as a deploy key
# with write access.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-deploy-key
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: github-deploy-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ssh-privatekey
      remoteRef:
        key: argo-workflows/github-deploy-key
        property: ssh-privatekey
