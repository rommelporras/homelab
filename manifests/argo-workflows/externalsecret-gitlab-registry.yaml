# manifests/argo-workflows/externalsecret-gitlab-registry.yaml
# Renders a kubernetes.io/dockerconfigjson Secret for BuildKit to push
# images to registry.k8s.rommelporras.com (GitLab registry). The
# build-image WorkflowTemplate mounts this Secret as /home/user/.docker
# so buildctl-daemonless.sh picks up the auth automatically.
#
# Source: Vault argo-workflows/gitlab-registry with username/password
# fields (seeded from 1P item "Argo Workflows CI/CD").
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-registry
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: gitlab-registry
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "registry.k8s.rommelporras.com": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: argo-workflows/gitlab-registry
        property: username
    - secretKey: password
      remoteRef:
        key: argo-workflows/gitlab-registry
        property: password
