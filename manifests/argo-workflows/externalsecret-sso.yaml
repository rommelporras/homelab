# manifests/argo-workflows/externalsecret-sso.yaml
# OIDC client credentials for argo-server SSO (Phase 5.9.1.7).
#
# Source: Vault KV secret/argo-workflows/sso-credentials with fields
# client-id and client-secret, seeded from 1Password "Argo Workflows"
# (renamed from "Argo Workflows UI" in Phase 5.9.1 Stage 2) in the
# Kubernetes vault.
#
# Target Secret name `argo-server-sso` and key names `client-id` /
# `client-secret` match the Helm chart defaults for
# server.sso.clientId.* / server.sso.clientSecret.*, so no extra
# overrides are needed in helm/argo-workflows/values.yaml.
#
# ClusterSecretStore vault-backend selects namespaces by label
# eso-enabled="true" (set on the argo-workflows namespace).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argo-server-sso
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: argo-server-sso
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client-id
      remoteRef:
        key: argo-workflows/sso-credentials
        property: client-id
    - secretKey: client-secret
      remoteRef:
        key: argo-workflows/sso-credentials
        property: client-secret
