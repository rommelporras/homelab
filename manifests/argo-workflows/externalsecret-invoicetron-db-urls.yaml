# manifests/argo-workflows/externalsecret-invoicetron-db-urls.yaml
# Combines both Invoicetron DATABASE_URLs into a single Secret for the
# migrate step. The workflow selects the right key via a parameter:
#
#   env:
#     - name: DATABASE_URL
#       valueFrom:
#         secretKeyRef:
#           name: invoicetron-migrate-db-urls
#           key: "{{workflow.parameters.environment}}"    # dev | prod
#
# Keeping the two URLs in one Secret (instead of two Secrets named
# `invoicetron-<env>-db`) means ci-workflow-sa needs only one
# resourceName grant in its Role.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoicetron-migrate-db-urls
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: invoicetron-migrate-db-urls
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: dev
      remoteRef:
        key: invoicetron-dev/app
        property: database-url
    - secretKey: prod
      remoteRef:
        key: invoicetron-prod/app
        property: database-url
