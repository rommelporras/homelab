# manifests/argo-workflows/namespace.yaml
# Namespace for Argo Workflows (Phase 5.9).
#
# Labels:
# - pod-security.kubernetes.io/enforce=baseline - workflow pods need to
#   mount PVCs and run shell commands; restricted blocks too much.
# - pod-security.kubernetes.io/warn=restricted - still warn on riskier specs.
# - eso-enabled=true - allows the vault-backend ClusterSecretStore to sync
#   ExternalSecrets into this namespace (namespace selector on the CSS).
#
# Bootstrap note: applied imperatively once via
#   kubectl-admin apply -f manifests/argo-workflows/namespace.yaml
# because both the Helm Application and the Git manifests Application
# target this namespace with CreateNamespace=false. After the first
# apply, ArgoCD owns this object via the Git app.
---
apiVersion: v1
kind: Namespace
metadata:
  name: argo-workflows
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    eso-enabled: "true"
