# manifests/argo-workflows/externalsecret-discord.yaml
# Reuses the shared monitoring/discord-webhooks Vault KV entry
# (same pattern as monitoring, kube-system cluster-janitor, arr-stack).
# Only the `incidents` webhook is needed here - the vault-snapshot
# notify step posts failures to #incidents.
#
# ClusterSecretStore vault-backend selects namespaces by label
# eso-enabled="true", which is set on the argo-workflows namespace.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-webhooks
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: discord-webhooks
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: incidents
      remoteRef:
        key: monitoring/discord-webhooks
        property: incidents
