# manifests/argo-workflows/externalsecret-gitlab-clone-token.yaml
# Renders a Secret with the GitLab group deploy token (gitlab+deploy-token-1,
# scope: read_repository) for the clone WorkflowTemplate to check out
# private GitLab repos over HTTPS basic-auth.
#
# Source: Vault argo-workflows/gitlab-clone-token with username/password
# fields (seeded from 1P item "Invoicetron Deploy Token").
#
# Reused by every CI pipeline cloning from gitlab.k8s.rommelporras.com;
# portfolio currently clones from public GitHub and does not consume it.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-clone-token
  namespace: argo-workflows
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: gitlab-clone-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: argo-workflows/gitlab-clone-token
        property: username
    - secretKey: password
      remoteRef:
        key: argo-workflows/gitlab-clone-token
        property: password
