# AdGuard Home Backup CronJob
# Phase 5.4 D2: Daily SQLite backup + config to NAS via NFS
#
# Schedule: Daily 02:05 Manila time (staggered with other backups)
# Retention: 3 days (deep history in restic off-site)
#
# AdGuard stores data in two subPaths on the same PVC (adguard-data):
#   - conf/ (AdGuardHome.yaml config)
#   - work/ (data.db SQLite database, query logs)
# This CronJob mounts the raw PVC (no subPath) to access both.
#
# IMPORTANT: SQLite backup uses .backup API (NOT raw cp).
# Raw file copy of live SQLite with WAL mode causes corruption.
#
# Manual test run:
#   kubectl-homelab create job --from=cronjob/adguard-backup adguard-backup-test -n home
#   kubectl-homelab logs -n home job/adguard-backup-test
#
# CKA topics: CronJob, NFS volume, SQLite backup, nodeSelector
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: adguard-backup
  namespace: home
  labels:
    app: adguard-backup
    app.kubernetes.io/part-of: adguard-home
spec:
  schedule: "5 2 * * *"
  timeZone: "Asia/Manila"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: adguard-backup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          # Schedule on same node as adguard-home pod (RWO PVC).
          # podAffinity is resilient to pod rescheduling unlike hardcoded nodeSelector.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: adguard-home
                  topologyKey: kubernetes.io/hostname
          securityContext:
            # Root required: AdGuard writes config as root:root 600.
            # PSS baseline (enforce) allows root. Restricted is warn-only.
            runAsUser: 0
            runAsGroup: 0
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: keinos/sqlite3:3.46.1
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  export TZ=UTC-8
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR="/backup/adguard-${TIMESTAMP}"
                  mkdir -p "$BACKUP_DIR"
                  # AdGuard uses BoltDB (not SQLite) for stats.db and sessions.db.
                  # BoltDB is append-only, so cp is safe for backup.
                  for db in /data/work/data/*.db; do
                    [ -f "$db" ] || continue
                    DBNAME=$(basename "$db")
                    cp "$db" "${BACKUP_DIR}/${DBNAME}"
                    echo "  BoltDB backup: $DBNAME ($(du -h "${BACKUP_DIR}/${DBNAME}" | cut -f1))"
                  done
                  # Backup config
                  cp /data/conf/AdGuardHome.yaml "${BACKUP_DIR}/"
                  echo "  Config backup: AdGuardHome.yaml"
                  echo "Backup created: $BACKUP_DIR ($(du -sh "$BACKUP_DIR" | cut -f1))"
                  # Prune backups older than 3 days
                  find /backup -maxdepth 1 -name "adguard-*" -type d -mtime +3 -exec rm -rf {} +
                  echo "Backup complete. Current files:"
                  ls -lh /backup/
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests: { cpu: 50m, memory: 64Mi }
                limits: { cpu: 200m, memory: 128Mi }
              volumeMounts:
                - name: data
                  mountPath: /data
                - name: backup
                  mountPath: /backup
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: adguard-data
            - name: backup
              nfs:
                server: 10.10.30.4
                path: /Kubernetes/Backups/adguard
