# ExternalSecret for Homepage widget secrets
# Phase 4.29: Replaces imperative kubectl create secret
#
# Vault path: secret/homepage/secrets
# Creates K8s Secret: homepage-secrets (31 keys via dataFrom.extract)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: home
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: homepage-secrets
  dataFrom:
    - extract:
        key: homepage/secrets
