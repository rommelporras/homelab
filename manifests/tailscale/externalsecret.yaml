# ExternalSecret for Tailscale Operator OAuth credentials
# Replaces the imperative Secret that was lost during Helm-to-ArgoCD handover.
#
# Vault path: secret/tailscale/operator-oauth
# Creates K8s Secret: operator-oauth (2 keys: client_id, client_secret)
# 1Password item: op://Kubernetes/Tailscale K8s Operator
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: operator-oauth
  namespace: tailscale
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: operator-oauth
  dataFrom:
    - extract:
        key: tailscale/operator-oauth
