# ExternalSecrets for GitLab
# Phase 4.29: Replaces imperative kubectl create secret
#
# 1. gitlab-root-password — Vault: secret/gitlab/root-password (1 key)
# 2. gitlab-postgresql-password — Vault: secret/gitlab/postgresql-password (2 keys)
# 3. gitlab-smtp-password — Vault: secret/gitlab/smtp-password (1 key)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-root-password
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-root-password
  data:
    - secretKey: password
      remoteRef:
        key: gitlab/root-password
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-postgresql-password
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-postgresql-password
  data:
    - secretKey: postgresql-password
      remoteRef:
        key: gitlab/postgresql-password
        property: postgresql-password
    - secretKey: postgresql-postgres-password
      remoteRef:
        key: gitlab/postgresql-password
        property: postgresql-postgres-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-smtp-password
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-smtp-password
  data:
    - secretKey: password
      remoteRef:
        key: gitlab/smtp-password
        property: password
