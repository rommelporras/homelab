# Version Check CronJob
# Weekly Discord digest of Helm chart drift using Nova
#
# Schedule: Sunday 08:00 PHT (Asia/Manila)
# Init container: copies Nova binary from official image to shared emptyDir
# Main container: runs the version-check script with curl + jq
#
# Uses alpine/k8s:1.35.3 which includes curl + jq (no apk add needed).
# TZ=UTC-8 because alpine/k8s has no tzdata (POSIX UTC-8 = UTC+8 = Manila).
#
# CKA topics: CronJob, init containers, emptyDir, ConfigMap mount, Secret env
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: version-check
  namespace: monitoring
  labels:
    app: version-check
spec:
  schedule: "0 8 * * 0"
  timeZone: "Asia/Manila"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      template:
        metadata:
          labels:
            app: version-check
        spec:
          # automountServiceAccountToken must remain true (default) — Nova uses in-cluster config
          # to read Helm release secrets (type: helm.sh/release.v1) cluster-wide for chart drift.
          # Phase 5.0 hardening incorrectly set this to false, silently breaking Nova auth.
          serviceAccountName: version-check-cronjob
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: nova
              image: quay.io/fairwinds/nova:v3.11.13
              imagePullPolicy: IfNotPresent
              command: ["cp", "/nova", "/shared/nova"]
              resources:
                requests:
                  cpu: "10m"
                  memory: "16Mi"
                limits:
                  cpu: "50m"
                  memory: "32Mi"
              securityContext:
                runAsNonRoot: true
                runAsUser: 65534
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
              volumeMounts:
                - name: shared
                  mountPath: /shared
          containers:
            - name: version-check
              image: alpine/k8s:1.35.3
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "/scripts/version-check.sh"]
              env:
                - name: TZ
                  value: "UTC-8"
                - name: DISCORD_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: monitoring-discord-webhooks
                      key: apps
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "256Mi"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: shared
                  mountPath: /shared
                - name: script
                  mountPath: /scripts
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: shared
              emptyDir: {}
            - name: script
              configMap:
                name: version-check-script
                defaultMode: 0555
            - name: tmp
              emptyDir: {}
