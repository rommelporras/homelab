apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-alerts
  namespace: monitoring
  labels:
    release: prometheus
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: argocd
      rules:
        - alert: ArgocdAppOutOfSync
          expr: |
            argocd_app_info{sync_status="OutOfSync", name!~"cilium|gitlab"} == 1
          for: 30m
          labels:
            severity: warning
            category: apps
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is out of sync"
            description: "Application {{ $labels.name }} in project {{ $labels.project }} has been OutOfSync for 30 minutes."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdAppOutOfSync"

        - alert: ArgocdAppUnhealthy
          expr: |
            argocd_app_info{health_status!~"Healthy|Progressing"} == 1
          for: 15m
          labels:
            severity: warning
            category: apps
          annotations:
            summary: "ArgoCD app {{ $labels.name }} is unhealthy"
            description: "Application {{ $labels.name }} health status is {{ $labels.health_status }} for 15 minutes."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdAppUnhealthy"

        - alert: ArgocdSyncFailed
          expr: |
            increase(argocd_app_sync_total{phase!="Succeeded"}[1h]) > 0
          labels:
            severity: critical
            category: infra
          annotations:
            summary: "ArgoCD sync failed for {{ $labels.name }}"
            description: "Application {{ $labels.name }} sync failed in the last hour."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdSyncFailed"

        - alert: ArgocdRepoServerDown
          expr: |
            up{job="argocd-repo-server-metrics"} == 0
          for: 5m
          labels:
            severity: critical
            category: infra
          annotations:
            summary: "ArgoCD repo server is down"
            description: "ArgoCD repo-server has been unreachable for 5 minutes. No syncs can proceed."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdRepoServerDown"

        - alert: ArgocdControllerDown
          expr: |
            up{job="argocd-application-controller-metrics"} == 0
          for: 5m
          labels:
            severity: critical
            category: infra
          annotations:
            summary: "ArgoCD application controller is down"
            description: "ArgoCD application-controller has been unreachable for 5 minutes. Reconciliation is stopped."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdControllerDown"

        - alert: ArgocdGitFetchFailed
          expr: |
            increase(argocd_git_request_total{request_type="ls-remote", grpc_code!="OK"}[15m]) > 3
          labels:
            severity: critical
            category: infra
          annotations:
            summary: "ArgoCD Git fetch failing for {{ $labels.repo }}"
            description: "More than 3 failed Git ls-remote requests in 15 minutes for {{ $labels.repo }}. ArgoCD cannot detect new commits - all syncs are stalled."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdGitFetchFailed"

        - alert: ArgocdClusterConnectionLost
          expr: |
            argocd_cluster_connection_status != 1
          for: 5m
          labels:
            severity: critical
            category: infra
          annotations:
            summary: "ArgoCD lost connection to cluster {{ $labels.server }}"
            description: "ArgoCD cannot reach the Kubernetes API server. Health checks, sync operations, and drift detection are all offline."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdClusterConnectionLost"

        - alert: ArgocdRepoServerPending
          expr: |
            argocd_repo_pending_request_total > 5
          for: 10m
          labels:
            severity: warning
            category: infra
          annotations:
            summary: "ArgoCD repo-server has {{ $value }} pending requests"
            description: "High pending request queue on repo-server for 10 minutes. Manifest generation is bottlenecked - syncs will be delayed."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdRepoServerPending"

        - alert: ArgocdNotificationDeliveryFailed
          expr: |
            increase(argocd_notifications_deliveries_total{succeeded="false"}[1h]) > 0
          labels:
            severity: warning
            category: infra
          annotations:
            summary: "ArgoCD notification delivery failed"
            description: "Failed to deliver notifications via {{ $labels.service }} in the last hour. Discord sync alerts may be silently broken."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argocd.md#ArgocdNotificationDeliveryFailed"
