# PrometheusRule for Longhorn Volume Health Alerts
# Phase 5.4.5.4: Stuck volumes that need human intervention
#
# Metrics sources (all numeric gauges, no state/robustness labels):
#   longhorn_volume_robustness - 0=unknown, 1=healthy, 2=degraded, 3=faulted
#   longhorn_volume_state - 2=attached, 3=detached
#
# Note: LonghornVolumeDegraded (robustness==2) and LonghornVolumeReplicaFailed
# (robustness==3) already exist in storage-alerts.yaml. This file only covers
# the stuck/unknown case not handled elsewhere.
#
# Context: Cluster Janitor skips volumes with 0 running replicas (safety).
# This alert catches volumes that need human intervention.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: longhorn-alerts
  namespace: monitoring
  labels:
    release: prometheus
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: longhorn
      rules:
        # WARNING: Longhorn volume has no running replicas
        # robustness=0 (unknown) AND state=3 (detached) means all replicas stopped.
        # Cluster Janitor cannot clean this (safety). Manual intervention needed.
        - alert: LonghornVolumeAllReplicasStopped
          expr: |
            longhorn_volume_robustness == 0
            and longhorn_volume_state == 3
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume {{ $labels.volume }} has no running replicas"
            description: "All replicas stopped for PVC {{ $labels.pvc }} in {{ $labels.pvc_namespace }}. Cluster Janitor cannot clean this (safety). Manual intervention needed."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/storage.md#LonghornVolumeAllReplicasStopped"

        # WARNING: Longhorn UI is unreachable
        - alert: LonghornUIDown
          expr: probe_success{job="longhorn-ui"} == 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn UI is unreachable"
            description: "Blackbox HTTP probe to longhorn-frontend.longhorn-system.svc:80 has failed for 10+ minutes. Storage dashboard is unavailable."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/storage.md#LonghornUIDown"

        # Phase 5.9.7: Longhorn auto-salvaged a volume after replica error(s).
        # Counter is emitted by Alloy's cluster_events pipeline matching
        # k8s Event "reason=AutoSalvaged" (cp1 collector only, no deduping
        # needed). One salvage is usually benign; repeated salvages on the
        # same node indicate hardware or networking issues.
        #
        # The counter has no per-volume labels (extracting them from logfmt
        # output is brittle). On fire, triage via Loki:
        #   {source="kubernetes_events"} |= "AutoSalvaged"
        # Alloy's loki.process component prefixes stage.metrics counters
        # with `loki_process_custom_`; this is hardcoded and not removable.
        - alert: LonghornVolumeAutoSalvaged
          expr: increase(loki_process_custom_longhorn_volume_auto_salvaged_total[15m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn auto-salvaged a volume."
            description: >-
              Longhorn detected replica errors and triggered AutoSalvaged
              ({{ $value | humanize }} event(s) in the last 15m). Query Loki
              `{source=\"kubernetes_events\"} |= \"AutoSalvaged\"` for the
              specific volume. Investigate kernel logs on the replica's host
              for PCIe/iSCSI errors.
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/longhorn-hardware.md#LonghornVolumeAutoSalvaged"
