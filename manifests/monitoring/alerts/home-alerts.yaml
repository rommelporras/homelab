# PrometheusRule for Home Namespace Alerts
# Phase 5.5: Monitor Homepage dashboard and MySpeed availability
#
# Metrics used:
#   probe_success{job="homepage"} - Blackbox HTTP probe
#   probe_success{job="myspeed"} - Blackbox HTTP probe
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: home-alerts
  namespace: monitoring
  labels:
    release: prometheus
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: home
      rules:
        # WARNING: Homepage dashboard is unreachable
        - alert: HomepageDown
          expr: probe_success{job="homepage"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Homepage dashboard is unreachable"
            description: "Blackbox HTTP probe to homepage.home.svc:3000 has failed for 5+ minutes. Cluster dashboard is unavailable."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/apps.md#HomepageDown"

        # WARNING: MySpeed is unreachable
        - alert: MySpeedDown
          expr: probe_success{job="myspeed"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "MySpeed is unreachable"
            description: "Blackbox HTTP probe to myspeed.home.svc:5216 has failed for 5+ minutes. Speed test monitoring is unavailable."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/apps.md#MySpeedDown"
