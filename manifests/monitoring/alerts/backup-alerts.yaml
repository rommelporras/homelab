# PrometheusRule for Backup & CronJob Health Alerts
# Phase 5.4.5.1-5.3: Velero, Longhorn backup, etcd backup, CronJob failures
# Phase 5.5: Added GarageDown alert (Garage S3 backend health)
#
# Metrics sources:
#   velero_backup_failure_total, velero_backup_last_successful_timestamp - Velero ServiceMonitor
#   velero_backup_success_total - Velero ServiceMonitor
#   longhorn_backup_state - Longhorn ServiceMonitor (numeric: 0=New, 1=Pending, 2=InProgress, 3=Completed, 4=Error, 5=Unknown)
#   kube_resourcequota - kube-state-metrics
#   kube_cronjob_status_last_successful_time - kube-state-metrics
#   kube_cronjob_spec_starting_deadline_seconds - kube-state-metrics
#   kube_job_status_failed - kube-state-metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backup-alerts
  namespace: monitoring
  labels:
    release: prometheus
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: backup
      rules:
        # CRITICAL: Velero backup failures exceed successes
        - alert: VeleroBackupFailed
          expr: velero_backup_failure_total > velero_backup_success_total
          for: 1h
          labels:
            severity: critical
          annotations:
            summary: "Velero backup failures exceed successes"
            description: "Velero has more backup failures than successes. Check Velero logs and backup schedule."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#VeleroBackupFailed"

        # WARNING: No successful Velero backup in 36 hours
        # schedule!="" excludes manual/ad-hoc backup timestamps (no schedule label)
        # which go stale and fire false positives
        - alert: VeleroBackupStale
          expr: time() - velero_backup_last_successful_timestamp{schedule!=""} > 129600
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "No successful Velero backup in 36 hours"
            description: "Velero has not completed a successful backup in over 36 hours. Daily schedule may be stuck."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#VeleroBackupStale"

        # WARNING: Longhorn volume backup in error state
        - alert: LonghornBackupFailed
          expr: longhorn_backup_state == 4
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Longhorn volume backup in error state"
            description: "A Longhorn backup is in Error state. Check Longhorn UI or backup target configuration."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#LonghornBackupFailed"

        # CRITICAL: Garage S3 backend is down — Velero backups will fail
        # Without this, Garage failure detection relies on VeleroBackupStale (36h delay)
        - alert: GarageDown
          expr: up{job="garage"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Garage S3 backend is down"
            description: "Garage S3 backend has been unreachable for 5+ minutes. Velero backups will fail until Garage is restored."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#GarageDown"

        # WARNING: Namespace using >85% of resource quota
        - alert: ResourceQuotaNearLimit
          expr: |
            kube_resourcequota{type="used"} / kube_resourcequota{type="hard"} > 0.85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Namespace {{ $labels.namespace }} using >85% of {{ $labels.resource }} quota"
            description: "Resource quota {{ $labels.resourcequota }} in namespace {{ $labels.namespace }} is at {{ $value | humanizePercentage }} utilization."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#ResourceQuotaNearLimit"

        # CRITICAL: No successful etcd backup in 36 hours
        - alert: EtcdBackupStale
          expr: |
            time() - kube_cronjob_status_last_successful_time{cronjob="etcd-backup",namespace="kube-system"} > 129600
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "No successful etcd backup in 36 hours"
            description: "The etcd-backup CronJob has not completed successfully in over 36 hours. etcd data may not be recoverable."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#EtcdBackupStale"

    - name: cronjob
      rules:
        # WARNING: A Job has failed
        - alert: CronJobFailed
          expr: |
            kube_job_status_failed{namespace!=""} > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Job {{ $labels.namespace }}/{{ $labels.job_name }} failed"
            description: "Check logs: kubectl-homelab logs -n {{ $labels.namespace }} job/{{ $labels.job_name }}"
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#CronJobFailed"

        # WARNING: CronJob missed 2+ scheduled runs
        - alert: CronJobNotScheduled
          expr: |
            time() - kube_cronjob_status_last_successful_time > 2 * (
              kube_cronjob_spec_starting_deadline_seconds > 0
              or on() vector(86400)
            )
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} missed 2+ scheduled runs"
            description: "CronJob has not succeeded in over twice its expected interval. May be suspended or failing silently."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/backup.md#CronJobNotScheduled"
