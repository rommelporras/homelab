# PrometheusRule for Vault + ESO Alerts
# Phase 4.29: Monitor Vault seal status, audit, latency, ESO sync, snapshot health
#
# Metrics sources:
#   vault_core_unsealed — Vault seal state (ServiceMonitor: vault-metrics, job="vault")
#   vault_audit_log_request_failure — audit device failures (same source)
#   vault_core_handle_request — request handling latency (same source)
#   probe_success{job="vault"} — Blackbox HTTP probe (/v1/sys/health — returns 503 when sealed)
#   externalsecret_status_condition — ESO sync state (ESO ServiceMonitor)
#   externalsecret_sync_calls_error — ESO sync errors (ESO ServiceMonitor)
#   kube_job_status_failed — CronJob failure (kube-state-metrics)
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vault-alerts
  namespace: monitoring
  labels:
    release: prometheus
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: vault
      rules:
        # CRITICAL: Vault is sealed — all ESO syncs will fail, no new secrets
        # Two detection methods:
        #   1. vault_core_unsealed == 0 — direct metric says sealed
        #   2. absent() + probe failing — metrics missing AND /v1/sys/health returns 503 (sealed)
        # The absent() clause requires probe_success==0 to avoid false positives when
        # metrics are temporarily unavailable but Vault is actually healthy.
        - alert: VaultSealed
          expr: |
            vault_core_unsealed == 0
            or
            (
              absent(vault_core_unsealed{job="vault"})
              and
              probe_success{job="vault"} == 0
            )
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Vault is sealed — ExternalSecrets cannot sync"
            description: "vault-0 has been sealed for >2m. Unsealer should auto-recover within 30s. If this alert fires, unsealer may be broken."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#VaultSealed"

        # WARNING: Vault metrics are not being scraped
        # Fires when no vault_core_unsealed metric exists but Vault is up (probe succeeds).
        # Indicates ServiceMonitor or metrics endpoint misconfiguration.
        - alert: VaultMetricsMissing
          expr: absent(vault_core_unsealed{job="vault"}) and probe_success{job="vault"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Vault metrics not being scraped — alerting is degraded"
            description: "Vault is healthy (probe succeeds) but no vault_* metrics exist. VaultSealed, VaultAuditFailure, and VaultHighLatency alerts cannot fire without metrics."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#VaultMetricsMissing"

        # CRITICAL: Vault audit log is failing — compliance violation
        - alert: VaultAuditFailure
          expr: increase(vault_audit_log_request_failure[5m]) > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Vault audit logging is failing"
            description: "Vault audit device has logged failures. All Vault operations should be audited — this is a compliance risk."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#VaultAuditFailure"

        # WARNING: Vault UI/API is unreachable via Blackbox probe
        - alert: VaultDown
          expr: probe_success{job="vault"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Vault is unreachable"
            description: "Blackbox probe to Vault UI has been failing for >5m. ESO may lose connectivity."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#VaultDown"

        # WARNING: Vault request latency is high
        - alert: VaultHighLatency
          expr: vault_core_handle_request{quantile="0.5"} > 500
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Vault median request latency >500ms"
            description: "Vault is responding slowly. Check Raft storage health and pod resources."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#VaultHighLatency"

    - name: external-secrets
      rules:
        # CRITICAL: ExternalSecret is stuck in not-synced state
        - alert: ESOSecretNotSynced
          expr: externalsecret_status_condition{condition="SecretSynced", status="False"} == 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "ExternalSecret {{ $labels.namespace }}/{{ $labels.name }} not synced"
            description: "An ExternalSecret has been in SecretSynced=False state for >10m. The K8s Secret may be stale or missing."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#ESOSecretNotSynced"

        # WARNING: ESO sync errors are occurring
        - alert: ESOSyncErrors
          expr: increase(externalsecret_sync_calls_error[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "ExternalSecret sync errors in {{ $labels.namespace }}/{{ $labels.name }}"
            description: "ESO is failing to sync secrets from Vault. May be transient (Vault restart) or permanent (missing path)."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#ESOSyncErrors"

        # CRITICAL: ESO webhook is down — ExternalSecret validation blocked
        - alert: ESOWebhookDown
          expr: probe_success{job="external-secrets-webhook"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "External Secrets webhook is unreachable"
            description: "ESO webhook metrics endpoint has been down for 5+ minutes. ExternalSecret create/update operations will be rejected by the API server."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#ESOWebhookDown"

        # WARNING: Raft snapshot CronJob is failing
        - alert: VaultSnapshotFailing
          expr: kube_job_status_failed{namespace="vault", job_name=~"vault-snapshot.*"} > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Vault Raft snapshot CronJob is failing"
            description: "Daily Vault backup has been failing for >30m. NFS NAS may be unreachable."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/vault.md#VaultSnapshotFailing"
