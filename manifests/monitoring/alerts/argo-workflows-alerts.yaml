# PrometheusRule for Argo Workflows
# Phase 5.9: Workflow failure detection and controller health
#
# Metric sources (emitted by workflow-controller on :9090, verified against
# a live scrape of v4.0.4 — names differ from the v3.x docs):
#
#   argo_workflows_gauge{phase, namespace}        gauge   # current workflow count by phase
#   argo_workflows_total_count{phase, namespace}  counter # cumulative workflows by phase
#   argo_workflows_error_count                    counter # controller reconcile errors
#   up{job=~".*argo-workflows.*"}                 gauge   # ServiceMonitor scrape liveness
#
# Important limitations of the v4 metrics:
#   - No per-Workflow `name` label. Alerts aggregate by namespace only.
#     Since we dedicate the `argo-workflows` namespace to the vault-snapshot
#     CronWorkflow for now, namespace-level alerts are equivalent to
#     per-workflow alerts.
#   - The old `argo_workflows_count{status=...}` from v3 docs does not
#     exist. Use `argo_workflows_gauge{phase=...}` for current-state
#     checks and `argo_workflows_total_count{phase=...}` for rate/increase.
#
# Note on coverage: CronWorkflow-created Workflows do NOT produce
# kube_job_status_failed (different CRD, different pod ownership chain).
# These rules are the complement to the generic CronJobFailed /
# CronJobNotScheduled alerts in backup-alerts.yaml.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argo-workflows-alerts
  namespace: monitoring
  labels:
    release: prometheus
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    - name: argo-workflows
      rules:
        # CRITICAL: Controller is down - nothing executes, nothing reconciles
        - alert: ArgoWorkflowsControllerDown
          expr: up{job=~".*argo-workflows.*workflow-controller.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Argo Workflows controller is down"
            description: "The argo-workflows workflow-controller has been unreachable for 5+ minutes. No Workflows or CronWorkflows can execute."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argo-workflows.md#ArgoWorkflowsControllerDown"

        # WARNING: One or more Workflows currently in Failed phase
        - alert: ArgoWorkflowFailed
          expr: |
            sum by (namespace) (argo_workflows_gauge{phase="Failed"}) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Argo Workflow(s) in Failed phase in {{ $labels.namespace }}"
            description: "{{ $value }} workflow(s) in {{ $labels.namespace }} are in Failed phase. Check: kubectl-admin get workflows -n {{ $labels.namespace }} --sort-by=.metadata.creationTimestamp"
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argo-workflows.md#ArgoWorkflowFailed"

        # WARNING: One or more Workflows in Error phase (infra failure, not step failure)
        - alert: ArgoWorkflowError
          expr: |
            sum by (namespace) (argo_workflows_gauge{phase="Error"}) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Argo Workflow(s) in Error phase in {{ $labels.namespace }}"
            description: "{{ $value }} workflow(s) in {{ $labels.namespace }} are in Error phase (infrastructure problem, not step exit)."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argo-workflows.md#ArgoWorkflowError"

        # WARNING: No successful workflow is currently tracked in the
        # argo-workflows namespace. Relies on the WorkflowTemplate's
        # ttlStrategy.secondsAfterSuccess=86400: a successful Workflow CR
        # stays visible (gauge >= 1) for 24h after completion. If no new
        # Workflow reaches Succeeded before the previous one is GC'd,
        # the gauge drops to 0 (or the time series disappears) and the
        # alert fires after `for:`.
        #
        # Why not argo_workflows_total_count[26h] increase: Prometheus
        # does not observe the first-ever 0->1 transition (controller
        # initialises the counter silently), so increase() returns 0
        # for the first 26h after install, causing a false positive.
        # The gauge-based check sidesteps that: a current value of 0 is
        # unambiguous regardless of scrape history.
        #
        # absent() of a comparison filter:
        #   - metric missing entirely: absent()=1 -> alert
        #   - metric exists, value=0: `gauge > 0` is empty, absent()=1 -> alert
        #   - metric exists, value>=1: absent()=0 -> no alert
        #
        # Since the argo-workflows namespace currently only contains the
        # vault-snapshot CronWorkflow, namespace-level absence of a
        # Succeeded gauge is equivalent to vault-snapshot-specific staleness.
        - alert: VaultSnapshotStale
          expr: |
            absent(argo_workflows_gauge{namespace="argo-workflows",phase="Succeeded"} > 0)
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "No successful vault-snapshot workflow in 24+ hours"
            description: "The vault-snapshot CronWorkflow has no currently-tracked Succeeded workflow. Either no workflow has completed in the 24h ttlStrategy window, or the CronWorkflow schedule has not fired. Check: kubectl-admin get workflows -n argo-workflows --sort-by=.metadata.creationTimestamp | tail"
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/argo-workflows.md#VaultSnapshotStale"
