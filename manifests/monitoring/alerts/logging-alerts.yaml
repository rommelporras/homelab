# PrometheusRule for Logging Stack Alerts
# Alerts for Loki and Alloy health issues
#
# Phase 5.5: Added compaction/retention/WAL alerts (LokiCompactionStalled,
# LokiRetentionNotRunning, LokiWALDiskFull) to close the storage health gap
# that caused the v0.33.2 incident.
#
# Apply:
#   kubectl-homelab apply -f manifests/monitoring/alerts/logging-alerts.yaml
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: logging-alerts
  namespace: monitoring
  labels:
    # This label ensures Prometheus picks it up
    release: prometheus
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  groups:
    # =========================================================================
    # Loki Alerts
    # =========================================================================
    - name: loki
      rules:
        # Alert if Loki is down
        - alert: LokiDown
          expr: up{job=~".*loki.*"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Loki is down"
            description: "Loki instance {{ $labels.instance }} has been down for more than 5 minutes."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#LokiDown"

        # Alert if Loki ingestion has stopped
        - alert: LokiIngestionStopped
          expr: sum(rate(loki_distributor_lines_received_total[5m])) == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Loki is not receiving any logs"
            description: "Loki has not received any log lines for 15 minutes. Check Alloy pods."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#LokiIngestionStopped"

        # Alert if Loki has high error rate
        - alert: LokiHighErrorRate
          expr: |
            sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[5m]))
            /
            sum(rate(loki_request_duration_seconds_count[5m]))
            > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Loki has high error rate"
            description: "Loki error rate is above 10% for the last 10 minutes."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#LokiHighErrorRate"

        # WARNING: Loki compaction has not run successfully in 3+ hours
        # Compactor runs every 10m (18 expected runs in 3h). 3h threshold matches
        # Loki's own mixin alert and tolerates pod rescheduling without false positives.
        - alert: LokiCompactionStalled
          expr: |
            (time() - loki_boltdb_shipper_compact_tables_operation_last_successful_run_timestamp_seconds) > 10800
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Loki compaction has not run successfully in 3+ hours"
            description: "Last successful compaction was {{ $value | humanizeDuration }} ago. Old chunks are not being merged, which will increase query latency and storage usage."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#LokiCompactionStalled"

        # WARNING: Loki retention enforcement has not run in 3+ hours
        # Without retention, old log data beyond the 60-day window is never deleted.
        # This was the root cause of the v0.33.2 PVC filling incident.
        - alert: LokiRetentionNotRunning
          expr: |
            (time() - loki_compactor_apply_retention_last_successful_run_timestamp_seconds) > 10800
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Loki retention enforcement has not run in 3+ hours"
            description: "Old log data beyond the 60-day retention period is not being deleted. PVC will eventually fill up. Last successful retention run was {{ $value | humanizeDuration }} ago."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#LokiRetentionNotRunning"

        # CRITICAL: Loki WAL write failures due to full disk
        # Counter only increments on actual data loss. Immediate alert is correct.
        - alert: LokiWALDiskFull
          expr: increase(loki_ingester_wal_disk_full_failures_total[5m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Loki WAL write failures due to full disk"
            description: "Loki ingester cannot write to WAL - log data is being dropped. Immediate investigation required."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#LokiWALDiskFull"

    # =========================================================================
    # Alloy Alerts
    # =========================================================================
    - name: alloy
      rules:
        # Alert if Alloy pods are not running on all nodes
        - alert: AlloyNotOnAllNodes
          expr: |
            count(up{job=~".*alloy.*"} == 1)
            <
            count(kube_node_info)
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Alloy not running on all nodes"
            description: "Expected {{ with query \"count(kube_node_info)\" }}{{ . | first | value }}{{ end }} Alloy pods but only {{ $value }} are running."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#AlloyNotOnAllNodes"

        # Alert if Alloy is not sending logs to Loki
        - alert: AlloyNotSendingLogs
          expr: sum(rate(loki_write_sent_bytes_total[5m])) == 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Alloy is not sending logs to Loki"
            description: "No logs have been sent to Loki for 15 minutes. Check Alloy configuration."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#AlloyNotSendingLogs"

        # Alert if Alloy has high memory usage (approaching limits)
        - alert: AlloyHighMemory
          expr: |
            container_memory_working_set_bytes{container="alloy", namespace="monitoring"}
            / on(namespace, pod) group_left()
            kube_pod_container_resource_limits{container="alloy", namespace="monitoring", resource="memory"}
            > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Alloy memory usage is high"
            description: "Alloy pod {{ $labels.pod }} is using more than 80% of its memory limit."
            runbook_url: "https://github.com/rommelporras/homelab/blob/main/docs/runbooks/logging.md#AlloyHighMemory"
