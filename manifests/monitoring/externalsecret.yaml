# ExternalSecrets for monitoring namespace
# Phase 4.29: Replaces imperative kubectl create secret
#
# 1. discord-version-webhook — Vault: secret/monitoring/discord-version-webhook
# 2. nut-credentials — Vault: secret/monitoring/nut-credentials
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-version-webhook
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: discord-version-webhook
  data:
    - secretKey: webhook-url
      remoteRef:
        key: monitoring/discord-version-webhook
        property: webhook-url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nut-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nut-credentials
  data:
    - secretKey: username
      remoteRef:
        key: monitoring/nut-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: monitoring/nut-credentials
        property: password
