# ExternalSecrets for monitoring namespace
# Phase 4.29: Replaces imperative kubectl create secret
#
# 1. discord-version-webhook — Vault: secret/monitoring/discord-version-webhook
# 2. nut-credentials — Vault: secret/monitoring/nut-credentials
# 3. monitoring-grafana-admin — Vault: secret/monitoring/grafana
# 4. monitoring-smtp — Vault: secret/monitoring/smtp
# 5. monitoring-discord-webhooks — Vault: secret/monitoring/discord-webhooks
# 6. monitoring-healthchecks — Vault: secret/monitoring/healthchecks
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-version-webhook
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: discord-version-webhook
  data:
    - secretKey: webhook-url
      remoteRef:
        key: monitoring/discord-version-webhook
        property: webhook-url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nut-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nut-credentials
  data:
    - secretKey: username
      remoteRef:
        key: monitoring/nut-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: monitoring/nut-credentials
        property: password
---
# Grafana admin credentials (used by grafana.admin.existingSecret)
# Template adds static admin-user key required by Grafana chart (kube-prometheus-stack 81.0.0+)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-grafana-admin
    template:
      data:
        admin-password: "{{ .adminPassword }}"
        admin-user: "admin"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: monitoring/grafana
        property: password
---
# SMTP credentials for Alertmanager email notifications
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-smtp
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-smtp
  data:
    - secretKey: username
      remoteRef:
        key: monitoring/smtp
        property: username
    - secretKey: password
      remoteRef:
        key: monitoring/smtp
        property: password
---
# Discord webhook URLs for Alertmanager receivers
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-discord-webhooks
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-discord-webhooks
  data:
    - secretKey: incidents
      remoteRef:
        key: monitoring/discord-webhooks
        property: incidents
    - secretKey: apps
      remoteRef:
        key: monitoring/discord-webhooks
        property: apps
    - secretKey: infra
      remoteRef:
        key: monitoring/discord-webhooks
        property: infra
---
# Healthchecks.io ping URL for Alertmanager Watchdog dead man's switch
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-healthchecks
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-healthchecks
  data:
    - secretKey: ping-url
      remoteRef:
        key: monitoring/healthchecks
        property: ping-url
