# ExternalSecrets for monitoring namespace
# Phase 4.29: Replaces imperative kubectl create secret
#
# 1. nut-credentials — Vault: secret/monitoring/nut-credentials
# 2. monitoring-grafana-admin — Vault: secret/monitoring/grafana
# 3. monitoring-smtp — Vault: secret/monitoring/smtp
# 4. monitoring-discord-webhooks — Vault: secret/monitoring/discord-webhooks
# 5. monitoring-healthchecks — Vault: secret/monitoring/healthchecks
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nut-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nut-credentials
  data:
    - secretKey: username
      remoteRef:
        key: monitoring/nut-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: monitoring/nut-credentials
        property: password
---
# Grafana admin credentials (used by grafana.admin.existingSecret)
# Template adds static admin-user key required by Grafana chart (kube-prometheus-stack 81.0.0+)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-grafana-admin
    template:
      data:
        admin-password: "{{ .adminPassword }}"
        admin-user: "admin"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: monitoring/grafana
        property: password
---
# SMTP credentials for Alertmanager email notifications
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-smtp
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-smtp
  data:
    - secretKey: username
      remoteRef:
        key: monitoring/smtp
        property: username
    - secretKey: password
      remoteRef:
        key: monitoring/smtp
        property: password
---
# Discord webhook URLs for Alertmanager receivers
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-discord-webhooks
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-discord-webhooks
  data:
    - secretKey: incidents
      remoteRef:
        key: monitoring/discord-webhooks
        property: incidents
    - secretKey: apps
      remoteRef:
        key: monitoring/discord-webhooks
        property: apps
    - secretKey: versions
      remoteRef:
        key: monitoring/discord-webhooks
        property: versions
    - secretKey: infra
      remoteRef:
        key: monitoring/discord-webhooks
        property: infra
---
# Healthchecks.io ping URL for Alertmanager Watchdog dead man's switch
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: monitoring-healthchecks
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: monitoring-healthchecks
  data:
    - secretKey: ping-url
      remoteRef:
        key: monitoring/healthchecks
        property: ping-url
---
# Alertmanager full config (used by alertmanager.alertmanagerSpec.configSecret)
# Assembles complete alertmanager.yaml from Vault secrets (SMTP, Discord, healthchecks).
# Replaces the SET_VIA_HELM upgrade-prometheus.sh pattern with declarative ESO template.
#
# ESO template escaping: alertmanager notification templates use Go template syntax
# ({{ .Status }}, {{ range .Alerts }}) which conflicts with ESO's template engine.
# Each alertmanager expression is escaped as {{ "{{" }} ... {{ "}}" }}.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: alertmanager-config
    template:
      engineVersion: v2
      data:
        alertmanager.yaml: |
          global:
            smtp_smarthost: 'smtp.mail.me.com:587'
            smtp_from: 'noreply@rommelporras.com'
            smtp_auth_username: '{{ .smtpUsername }}'
            smtp_auth_password: '{{ .smtpPassword }}'
            smtp_require_tls: true
          route:
            receiver: 'discord-apps'
            group_by: ['alertname', 'namespace', 'job']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            routes:
              - match:
                  alertname: KubeProxyDown
                receiver: 'null'
                continue: false
              - match:
                  alertname: CPUThrottlingHigh
                  namespace: monitoring
                receiver: 'null'
                continue: false
              - match:
                  alertname: Watchdog
                receiver: 'healthchecks-heartbeat'
                repeat_interval: 1m
                continue: false
              - match:
                  severity: critical
                receiver: 'discord-incidents-email'
                continue: false
              # Version checker: deduplicated daily digest to avoid 4096-char Discord truncation.
              # 161 alerts grouped by alertname only (one message per day, not per image).
              # Sends to #versions (dedicated channel) not #apps.
              - match:
                  alertname: VersionCheckerImageOutdated
                receiver: 'discord-versions'
                group_by: ['alertname']
                repeat_interval: 24h
                continue: false
              # Preferred: route by category label (set on the PrometheusRule).
              # Cleaner and doesn't require updating the alertname regex for every new infra alert.
              - match:
                  severity: warning
                  category: infra
                receiver: 'discord-infra'
                continue: false
              # Legacy fallback: alertname-based infra routing for rules that don't yet set category=infra.
              # Migrate alerts off this by adding `category: infra` label to their PrometheusRule, then remove them from the regex.
              - match:
                  severity: warning
                match_re:
                  alertname: '(Longhorn.*|NVMe.*|etcd.*|KubeVip.*|Certificate.*|CertManager.*|Node.*|UPS.*|NetworkInterface.*|KubePersistent.*|SmartCTL.*|KubeApiserver.*|CPUThrottling.*|Alloy.*|Loki.*|ClusterJanitor.*|Vault.*|ESO.*|Audit.*|Velero.*|Backup.*|ResourceQuota.*|CronJob.*|Garage.*)'
                receiver: 'discord-infra'
                continue: false
              - match:
                  severity: warning
                receiver: 'discord-apps'
                continue: false
              - match:
                  severity: info
                receiver: 'null'
                continue: false
          receivers:
            - name: 'discord-incidents-email'
              discord_configs:
                - webhook_url: '{{ .discordIncidents }}'
                  send_resolved: true
                  title: '{{ "{{" }} if eq .Status "firing" {{ "}}" }}🔴{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .Status | toUpper {{ "}}" }}: {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
                  message: |
                    {{ "{{" }} range .Alerts {{ "}}" }}
                    **{{ "{{" }} .Labels.alertname {{ "}}" }}** ({{ "{{" }} .Labels.severity {{ "}}" }})
                    {{ "{{" }} .Annotations.summary {{ "}}" }}
                    {{ "{{" }} if .Annotations.description {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} if .Annotations.runbook_url {{ "}}" }}Runbook: {{ "{{" }} .Annotations.runbook_url {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
              email_configs:
                - to: 'critical@rommelporras.com, r3mmel023@gmail.com, rommelcporras@gmail.com'
                  send_resolved: true
                  headers:
                    Subject: '[{{ "{{" }} .Status | toUpper {{ "}}" }}] {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
            - name: 'discord-infra'
              discord_configs:
                - webhook_url: '{{ .discordInfra }}'
                  send_resolved: true
                  title: '{{ "{{" }} if eq .Status "firing" {{ "}}" }}⚠️{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .Status | toUpper {{ "}}" }}: {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
                  message: |
                    {{ "{{" }} range .Alerts {{ "}}" }}
                    **{{ "{{" }} .Labels.alertname {{ "}}" }}** ({{ "{{" }} .Labels.severity {{ "}}" }})
                    {{ "{{" }} .Annotations.summary {{ "}}" }}
                    {{ "{{" }} if .Annotations.description {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} if .Annotations.runbook_url {{ "}}" }}Runbook: {{ "{{" }} .Annotations.runbook_url {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
            - name: 'discord-apps'
              discord_configs:
                - webhook_url: '{{ .discordApps }}'
                  send_resolved: true
                  title: '{{ "{{" }} if eq .Status "firing" {{ "}}" }}⚠️{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .Status | toUpper {{ "}}" }}: {{ "{{" }} .CommonLabels.alertname {{ "}}" }}'
                  message: |
                    {{ "{{" }} range .Alerts {{ "}}" }}
                    **{{ "{{" }} .Labels.alertname {{ "}}" }}** ({{ "{{" }} .Labels.severity {{ "}}" }})
                    {{ "{{" }} .Annotations.summary {{ "}}" }}
                    {{ "{{" }} if .Annotations.description {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} if .Annotations.runbook_url {{ "}}" }}Runbook: {{ "{{" }} .Annotations.runbook_url {{ "}}" }}{{ "{{" }} end {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
            - name: 'discord-versions'
              discord_configs:
                - webhook_url: '{{ .discordVersions }}'
                  send_resolved: false
                  title: '{{ "{{" }} .Status | toUpper {{ "}}" }}: VersionCheckerImageOutdated'
                  message: |
                    {{ "{{" }} range .Alerts {{ "}}" }}
                    **{{ "{{" }} .Labels.image {{ "}}" }}** running {{ "{{" }} .Labels.current_version {{ "}}" }}, latest {{ "{{" }} .Labels.latest_version {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}
            - name: 'null'
            - name: 'healthchecks-heartbeat'
              webhook_configs:
                - url: '{{ .healthchecksPingUrl }}'
                  send_resolved: false
          inhibit_rules:
            - source_match:
                severity: 'critical'
              target_match:
                severity: 'warning'
              equal: ['alertname', 'namespace']
  data:
    - secretKey: smtpUsername
      remoteRef:
        key: monitoring/smtp
        property: username
    - secretKey: smtpPassword
      remoteRef:
        key: monitoring/smtp
        property: password
    - secretKey: discordIncidents
      remoteRef:
        key: monitoring/discord-webhooks
        property: incidents
    - secretKey: discordInfra
      remoteRef:
        key: monitoring/discord-webhooks
        property: infra
    - secretKey: discordApps
      remoteRef:
        key: monitoring/discord-webhooks
        property: apps
    - secretKey: discordVersions
      remoteRef:
        key: monitoring/discord-webhooks
        property: versions
    - secretKey: healthchecksPingUrl
      remoteRef:
        key: monitoring/healthchecks
        property: ping-url
