apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-storage-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: kube-prometheus-stack
  annotations:
    grafana_folder: "Homelab"
data:
  loki-storage.json: |
    {
      "uid": "loki-storage",
      "title": "Loki Storage",
      "timezone": "Asia/Manila",
      "schemaVersion": 39,
      "editable": true,
      "graphTooltip": 1,
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Storage Health",
          "description": "Key storage health indicators. PVC usage is the first thing to check; compaction and retention keep it under control.",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "PVC Usage",
          "description": "Loki PVC usage percentage. The one number you check first.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.85 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "1 - (kubelet_volume_stats_available_bytes{persistentvolumeclaim=\"storage-loki-0\"} / kubelet_volume_stats_capacity_bytes{persistentvolumeclaim=\"storage-loki-0\"})",
              "legendFormat": "PVC Usage",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "WAL Usage",
          "description": "WAL bytes in use. WAL full = log data dropped.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 536870912 },
                  { "color": "red", "value": 1073741824 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "loki_ingester_wal_bytes_in_use",
              "legendFormat": "WAL Bytes",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Compaction Last Success",
          "description": "Seconds since last successful compaction. Should be under 600s (10 min cycle). Above 3h triggers LokiCompactionStalled alert.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 600 },
                  { "color": "red", "value": 10800 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "time() - loki_boltdb_shipper_compact_tables_operation_last_successful_run_timestamp_seconds",
              "legendFormat": "Since Last Compaction",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Retention Last Success",
          "description": "Seconds since last successful retention sweep. Above 3h triggers LokiRetentionNotRunning alert.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 600 },
                  { "color": "red", "value": 10800 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "time() - loki_compactor_apply_retention_last_successful_run_timestamp_seconds",
              "legendFormat": "Since Last Retention",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Ingestion & Retention",
          "description": "Ingestion rate vs retention activity. Ingestion should be stable; retention markers should trend to zero after initial catch-up.",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Ingestion Rate",
          "description": "Bytes ingested per second (1h rate). Capacity planning metric - answers 'is my ingestion growing?'",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum(rate(loki_ingester_chunk_stored_bytes_total[1h]))",
              "legendFormat": "Ingestion Rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Retention Markers Pending",
          "description": "Pending retention marker files. Should trend toward 0 after retention catches up. High during incidents means old data is queued for deletion.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "loki_boltdb_shipper_retention_sweeper_marker_files_current",
              "legendFormat": "Marker Files",
              "refId": "A"
            }
          ]
        }
      ]
    }
