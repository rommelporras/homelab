# Grafana Dashboard - Atuin Shell History Server
# Phase 4.30: Pod health, network traffic, resource usage for Atuin + PostgreSQL
# Auto-provisioned via grafana_dashboard label
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: atuin-dashboard
  namespace: monitoring
  annotations:
    grafana_folder: "Homelab"
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: kube-prometheus-stack
data:
  atuin.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "title": "Pod Status",
          "description": "Health status of Atuin sync server and its PostgreSQL database. Both must be UP for shell history sync to work.",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "text": "DOWN"
                    },
                    "1": {
                      "color": "green",
                      "text": "UP"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 1
          },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto"
          },
          "description": "Atuin sync server (Deployment). Handles client registration, login, and history sync via HTTPS on port 8888.",
          "title": "Atuin Server",
          "type": "stat",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"atuin\", deployment=\"atuin-server\"}",
              "legendFormat": "Available"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "text": "DOWN"
                    },
                    "1": {
                      "color": "green",
                      "text": "UP"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 1
          },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto"
          },
          "description": "PostgreSQL database (Deployment). Stores all synced shell history. Uses Longhorn PVC for persistent storage.",
          "title": "PostgreSQL",
          "type": "stat",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"atuin\", deployment=\"postgres\"}",
              "legendFormat": "Available"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 3600
                  },
                  {
                    "color": "green",
                    "value": 86400
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 1
          },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto"
          },
          "description": "How long the Atuin server pod has been running. Red < 1 hour, orange < 1 day, green > 1 day.",
          "title": "Server Uptime",
          "type": "stat",
          "targets": [
            {
              "expr": "time() - kube_pod_start_time{namespace=\"atuin\", pod=~\"atuin-server.*\"}",
              "legendFormat": "Uptime"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 3
                  },
                  {
                    "color": "red",
                    "value": 5
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 1
          },
          "id": 5,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "textMode": "auto"
          },
          "description": "Total container restarts across all Atuin namespace pods. Green = 0-2, orange = 3-4, red = 5+. Frequent restarts may indicate OOM kills or crashloops.",
          "title": "Container Restarts",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"atuin\"})",
              "legendFormat": "Total"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "id": 10,
          "title": "Network Traffic",
          "description": "Network throughput and packet rate for Atuin server and PostgreSQL pods. Atuin server handles HTTPS sync requests from clients. PostgreSQL handles internal SQL queries from the Atuin server.",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {
                  "mode": "none"
                }
              },
              "unit": "Bps"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Transmit"
                },
                "properties": [
                  {
                    "id": "custom.transform",
                    "value": "negative-Y"
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "id": 11,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "description": "Atuin server network throughput in bytes/sec. Bidirectional: above zero = Receive (sync requests from clients), below zero = Transmit (sync responses to clients).",
          "title": "Atuin Server Throughput",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"atuin\", pod=~\"atuin-server.*\"}[5m]))",
              "legendFormat": "Receive"
            },
            {
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"atuin\", pod=~\"atuin-server.*\"}[5m]))",
              "legendFormat": "Transmit"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {
                  "mode": "none"
                }
              },
              "unit": "Bps"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Transmit"
                },
                "properties": [
                  {
                    "id": "custom.transform",
                    "value": "negative-Y"
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "id": 12,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "description": "PostgreSQL network throughput in bytes/sec. Bidirectional: above zero = Receive (SQL queries from Atuin server), below zero = Transmit (query results back to Atuin server).",
          "title": "PostgreSQL Throughput",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"atuin\", pod=~\"postgres.*\"}[5m]))",
              "legendFormat": "Receive"
            },
            {
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"atuin\", pod=~\"postgres.*\"}[5m]))",
              "legendFormat": "Transmit"
            }
          ]
        },
        {
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "id": 20,
          "title": "Resource Usage",
          "description": "CPU and memory consumption of Atuin server and PostgreSQL. The server is lightweight (Rust binary). PostgreSQL handles most of the load with shared buffers and query execution.",
          "type": "row"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 15
          },
          "id": 21,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "description": "CPU cores used by Atuin server and PostgreSQL. Dashed lines show resource requests (guaranteed minimum) and limits (throttle ceiling).",
          "title": "CPU Usage (cores)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"atuin\", pod=~\"atuin-server.*\", container!=\"\"}[5m]))",
              "legendFormat": "Atuin Server"
            },
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"atuin\", pod=~\"postgres.*\", container!=\"\"}[5m]))",
              "legendFormat": "PostgreSQL"
            },
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"atuin\", container=\"atuin-server\", resource=\"cpu\"})",
              "legendFormat": "Server Request"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"atuin\", container=\"atuin-server\", resource=\"cpu\"})",
              "legendFormat": "Server Limit"
            },
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"atuin\", container=\"postgres\", resource=\"cpu\"})",
              "legendFormat": "PG Request"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"atuin\", container=\"postgres\", resource=\"cpu\"})",
              "legendFormat": "PG Limit"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "short"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Server Request"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [10, 10]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "yellow",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Server Limit"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [4, 4]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "red",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "PG Request"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [10, 10]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "blue",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "PG Limit"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [4, 4]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "orange",
                      "mode": "fixed"
                    }
                  }
                ]
              }
            ]
          }
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 15
          },
          "id": 22,
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "description": "Memory (working set) used by Atuin server and PostgreSQL. Dashed lines show resource requests (guaranteed minimum) and limits (OOM kill ceiling).",
          "title": "Memory Usage",
          "type": "timeseries",
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"atuin\", pod=~\"atuin-server.*\", container!=\"\"})",
              "legendFormat": "Atuin Server"
            },
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"atuin\", pod=~\"postgres.*\", container!=\"\"})",
              "legendFormat": "PostgreSQL"
            },
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"atuin\", container=\"atuin-server\", resource=\"memory\"})",
              "legendFormat": "Server Request"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"atuin\", container=\"atuin-server\", resource=\"memory\"})",
              "legendFormat": "Server Limit"
            },
            {
              "expr": "sum(kube_pod_container_resource_requests{namespace=\"atuin\", container=\"postgres\", resource=\"memory\"})",
              "legendFormat": "PG Request"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits{namespace=\"atuin\", container=\"postgres\", resource=\"memory\"})",
              "legendFormat": "PG Limit"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 15,
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "bytes"
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Server Request"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [10, 10]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "yellow",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Server Limit"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [4, 4]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "red",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "PG Request"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [10, 10]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "blue",
                      "mode": "fixed"
                    }
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "PG Limit"
                },
                "properties": [
                  {
                    "id": "custom.lineStyle",
                    "value": {
                      "fill": "dash",
                      "dash": [4, 4]
                    }
                  },
                  {
                    "id": "custom.lineWidth",
                    "value": 1
                  },
                  {
                    "id": "custom.fillOpacity",
                    "value": 0
                  },
                  {
                    "id": "color",
                    "value": {
                      "fixedColor": "orange",
                      "mode": "fixed"
                    }
                  }
                ]
              }
            ]
          }
        }
      ],
      "schemaVersion": 39,
      "tags": [
        "atuin",
        "shell-history",
        "infrastructure"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "Asia/Manila",
      "title": "Atuin Shell History Server",
      "uid": "atuin-shell-history",
      "version": 1
    }
