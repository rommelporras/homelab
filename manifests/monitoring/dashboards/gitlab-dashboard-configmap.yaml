apiVersion: v1
kind: ConfigMap
metadata:
  name: gitlab-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: kube-prometheus-stack
  annotations:
    grafana_folder: "Homelab"
data:
  gitlab.json: |
    {
      "uid": "gitlab",
      "title": "GitLab",
      "timezone": "Asia/Manila",
      "schemaVersion": 39,
      "editable": true,
      "graphTooltip": 1,
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Application Health",
          "description": "PostgreSQL and Redis availability plus connection and memory metrics. These are the first things to check when GitLab is slow or unavailable.",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "PostgreSQL Up",
          "description": "GitLab PostgreSQL availability. DOWN means all GitLab functionality is broken.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "pg_up{namespace=\"gitlab\"}",
              "legendFormat": "PostgreSQL",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Redis Up",
          "description": "GitLab Redis availability. DOWN causes severe performance degradation.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "redis_up{namespace=\"gitlab\"}",
              "legendFormat": "Redis",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "PostgreSQL Connections",
          "description": "Active PostgreSQL connections. Default max is 100.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "sum(pg_stat_activity_count{namespace=\"gitlab\"})",
              "legendFormat": "Connections",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Redis Memory",
          "description": "Redis memory usage. Watch for unexpected growth.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "single", "sort": "none" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "targets": [
            {
              "expr": "redis_memory_used_bytes{namespace=\"gitlab\"}",
              "legendFormat": "Memory Used",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "row",
          "title": "Pod Status",
          "description": "Running state for the six core GitLab pods. All should show UP. DOWN on webservice or gitaly means service is degraded.",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }
        },
        {
          "id": 11,
          "type": "stat",
          "title": "webservice",
          "description": "GitLab webservice pod status. Handles all HTTP requests and the Rails application.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "max(label_replace(kube_pod_status_ready{namespace=\"gitlab\", pod=~\"gitlab-webservice.*\", condition=\"true\"}, \"short_node\", \"$1\", \"node\", \"(.*)\"))",
              "legendFormat": "webservice",
              "refId": "A"
            }
          ]
        },
        {
          "id": 12,
          "type": "stat",
          "title": "sidekiq",
          "description": "GitLab Sidekiq pod status. Handles background jobs - email, imports, CI pipelines.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "max(label_replace(kube_pod_status_ready{namespace=\"gitlab\", pod=~\"gitlab-sidekiq.*\", condition=\"true\"}, \"short_node\", \"$1\", \"node\", \"(.*)\"))",
              "legendFormat": "sidekiq",
              "refId": "A"
            }
          ]
        },
        {
          "id": 13,
          "type": "stat",
          "title": "gitaly",
          "description": "GitLab Gitaly pod status. Handles all Git operations - push, pull, clone. DOWN means Git is broken.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "max(label_replace(kube_pod_status_ready{namespace=\"gitlab\", pod=~\"gitlab-gitaly.*\", condition=\"true\"}, \"short_node\", \"$1\", \"node\", \"(.*)\"))",
              "legendFormat": "gitaly",
              "refId": "A"
            }
          ]
        },
        {
          "id": 14,
          "type": "stat",
          "title": "registry",
          "description": "GitLab Container Registry pod status. Required for CI/CD container image push and pull.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "max(label_replace(kube_pod_status_ready{namespace=\"gitlab\", pod=~\"gitlab-registry.*\", condition=\"true\"}, \"short_node\", \"$1\", \"node\", \"(.*)\"))",
              "legendFormat": "registry",
              "refId": "A"
            }
          ]
        },
        {
          "id": 15,
          "type": "stat",
          "title": "postgresql",
          "description": "GitLab PostgreSQL pod status. Required for all data reads and writes.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "max(label_replace(kube_pod_status_ready{namespace=\"gitlab\", pod=~\"gitlab-postgresql.*\", condition=\"true\"}, \"short_node\", \"$1\", \"node\", \"(.*)\"))",
              "legendFormat": "postgresql",
              "refId": "A"
            }
          ]
        },
        {
          "id": 16,
          "type": "stat",
          "title": "redis",
          "description": "GitLab Redis pod status. Used for caching, sessions, and job queues.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" } } },
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" } } }
              ],
              "noValue": "DOWN",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "max(label_replace(kube_pod_status_ready{namespace=\"gitlab\", pod=~\"gitlab-redis.*\", condition=\"true\"}, \"short_node\", \"$1\", \"node\", \"(.*)\"))",
              "legendFormat": "redis",
              "refId": "A"
            }
          ]
        },
        {
          "id": 20,
          "type": "row",
          "title": "Resource Usage",
          "description": "CPU and memory consumption by GitLab pod. Useful for right-sizing requests and limits.",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 11 }
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "CPU Usage by Pod",
          "description": "CPU by GitLab pod. Webservice and Sidekiq are typically the heaviest consumers.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"gitlab\", container!=\"\"}[5m])) > 0",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 22,
          "type": "timeseries",
          "title": "Memory Usage by Pod",
          "description": "Memory by GitLab pod. Webservice uses the most memory (Ruby/Puma process).",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10,
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"gitlab\", container!=\"\"}) > 0",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
