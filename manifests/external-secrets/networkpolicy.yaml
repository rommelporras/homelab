# CiliumNetworkPolicies for external-secrets namespace
# 3 pods: external-secrets controller, cert-controller, webhook
#
# SECURITY PRIORITY: ESO can exfiltrate data if compromised.
# Only allow egress to Vault (8200) and kube-apiserver (6443).
# NO internet egress - ESO only needs Vault + K8s API.
#
# Default-deny enforced implicitly (ingress + egress policies both present per pod)

# ============================================================
# external-secrets controller
# Egress: kube-apiserver + Vault
# Ingress: monitoring (metrics 8080) + kubelet (health 8081)
# ============================================================
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: eso-controller-egress
  namespace: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: vault
            app.kubernetes.io/name: vault
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: eso-controller-ingress
  namespace: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP

# ============================================================
# external-secrets-cert-controller
# Egress: kube-apiserver only (manages webhook certs)
