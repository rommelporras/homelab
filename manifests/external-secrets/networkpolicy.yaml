# ============================================================
# external-secrets-webhook
# Egress: kube-apiserver (webhook validation)
# Ingress: kube-apiserver (admission webhook on 443) + monitoring (8080) + kubelet (8081)
# ============================================================
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: eso-webhook-egress
  namespace: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: eso-webhook-ingress
  namespace: external-secrets
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-secrets-webhook
  ingress:
    # Admission webhook requests from kube-apiserver
    # Service maps 443->10250 (container port); Cilium enforces at pod level
    # kube-apiserver + host: kubeadm apiserver runs with hostNetwork=true
    - fromEntities:
        - kube-apiserver
        - host
      toPorts:
        - ports:
            - port: "10250"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
