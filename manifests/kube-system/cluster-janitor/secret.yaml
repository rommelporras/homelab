#     --namespace kube-system \
#     --from-literal=webhook-url="$(op read 'op://Kubernetes/Discord Webhooks/janitor')"
#
---
apiVersion: v1
kind: Secret
metadata:
  name: discord-janitor-webhook
  namespace: kube-system
  labels:
    app: cluster-janitor
    app.kubernetes.io/part-of: cluster-janitor
  annotations:
    secret-source: "op://Kubernetes/Discord Webhooks/janitor"
    managed-by: "imperative-kubectl"
type: Opaque
