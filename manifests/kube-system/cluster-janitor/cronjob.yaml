# manifests/kube-system/cluster-janitor/cronjob.yaml
# Automated cluster cleanup — runs every 10 minutes
#
# Tasks:
#   1. Delete Failed pods (UnexpectedAdmissionError, OOMKilled leftovers)
#   2. Delete stopped Longhorn replicas (only if volume has >=1 healthy replica)
#   3. Delete Failed Jobs older than 1 hour (clears CronJobFailed alerts)
#   4. Post Discord embed to #janitor (only when something was cleaned)
#      Lists items per category (up to 5), includes failure reasons and CronJob owners
#      Color: green (routine, <=10 items), yellow (unusual, >10 items)
#
# Safety:
#   - Never deletes the last replica (data loss prevention)
#   - Each task is independent (no set -e, partial cleanup is fine)
#   - concurrencyPolicy: Forbid prevents overlapping runs
#   - backoffLimit: 0 — don't retry, wait for next scheduled run
#
# Discord webhook mounted from Secret:
#   kubectl-homelab create secret generic discord-janitor-webhook \
#     -n kube-system --from-literal=webhook-url="$(op read 'op://Kubernetes/Discord Webhooks/janitor')"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-janitor
  namespace: kube-system
spec:
  schedule: "*/10 * * * *"
  timeZone: "Asia/Manila"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 120
      template:
        metadata:
          labels:
            app: cluster-janitor
        spec:
          automountServiceAccountToken: true
          serviceAccountName: cluster-janitor
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: janitor
              image: alpine/k8s:1.35.0
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
              command: ["/bin/bash", "-c"]
              args:
                - |
                  # TZ=Asia/Manila doesn't work - alpine/k8s has no tzdata
                  # POSIX TZ convention: UTC-8 means UTC+8 hours (Manila/PHT)
                  export TZ=UTC-8
                  echo "=== Cluster Janitor $(date +%Y-%m-%dT%H:%M:%S%z) ==="
                  FAILED_PODS=0
                  STOPPED_REPLICAS=0

                  # Temp files for collecting detail lines per category
                  POD_DETAILS=$(mktemp /tmp/pods.XXXXXX)
                  REPLICA_DETAILS=$(mktemp /tmp/replicas.XXXXXX)
                  JOB_DETAILS=$(mktemp /tmp/jobs.XXXXXX)

                  # Task 1: Delete Failed pods (UnexpectedAdmissionError, OOMKilled, Evicted, etc.)
                  # Capture details (namespace, name, reason) before deleting
                  FAILED_POD_JSON=$(kubectl get pods -A --field-selector=status.phase=Failed -o json 2>/dev/null || echo '{"items":[]}')
                  FAILED_PODS=$(echo "$FAILED_POD_JSON" | jq '.items | length')
                  FAILED_PODS=${FAILED_PODS:-0}
                  if [ "$FAILED_PODS" -gt 0 ]; then
                    echo "[Task 1] Deleting $FAILED_PODS Failed pod(s)..."
                    # Extract details: namespace/name (reason)
                    echo "$FAILED_POD_JSON" | jq -r '.items[] |
                      (.metadata.namespace + "/" + .metadata.name + " (" +
                        ((.status.reason // (.status.containerStatuses[]?.state.terminated.reason // "Failed")) // "Unknown") +
                      ")")' > "$POD_DETAILS" 2>/dev/null
                    kubectl delete pods -A --field-selector=status.phase=Failed || true
                  else
                    echo "[Task 1] No Failed pods found."
                  fi

                  # Task 2: Delete stopped Longhorn replicas (only if volume has >=1 running replica)
                  echo "[Task 2] Checking for stopped Longhorn replicas..."
                  STOPPED_LIST=$(kubectl -n longhorn-system get replicas.longhorn.io \
                    -o jsonpath='{range .items[?(@.status.currentState=="stopped")]}{.metadata.name}{" "}{.spec.volumeName}{"\n"}{end}' 2>/dev/null || echo "")

                  if [ -n "$STOPPED_LIST" ]; then
                    while read -r REPLICA VOLUME; do
                      [ -z "$REPLICA" ] && continue
                      RUNNING=$(kubectl -n longhorn-system get replicas.longhorn.io \
                        -l longhornvolume="$VOLUME" \
                        -o jsonpath='{range .items[?(@.status.currentState=="running")]}{.metadata.name}{"\n"}{end}' 2>/dev/null | grep -c . || true)
                      RUNNING=${RUNNING:-0}
                      if [ "$RUNNING" -ge 1 ]; then
                        echo "  Deleting stopped replica $REPLICA (volume $VOLUME has $RUNNING healthy replica(s))"
                        kubectl -n longhorn-system delete replicas.longhorn.io "$REPLICA" || true
                        STOPPED_REPLICAS=$((STOPPED_REPLICAS + 1))
                        echo "$VOLUME ($REPLICA)" >> "$REPLICA_DETAILS"
                      else
                        echo "  SKIPPING $REPLICA - volume $VOLUME has 0 running replicas (last replica with data)"
                      fi
                    done <<< "$STOPPED_LIST"
                  else
                    echo "[Task 2] No stopped replicas found."
                  fi

                  # Task 3: Delete Failed Jobs older than 1 hour
                  # Capture owning CronJob name for context in Discord message
                  echo "[Task 3] Checking for stale Failed jobs..."
                  FAILED_JOBS=0
                  NOW_EPOCH=$(date +%s)
                  ONE_HOUR=3600
                  # Get failed jobs with owner reference for CronJob context
                  FAILED_JOB_JSON=$(kubectl get jobs -A -o json 2>/dev/null || echo '{"items":[]}')
                  FAILED_JOB_LIST=$(echo "$FAILED_JOB_JSON" | jq -r '.items[] | select(.status.failed != null and .status.failed > 0) | [.metadata.namespace, .metadata.name, .metadata.creationTimestamp, (.metadata.ownerReferences[]? | select(.kind=="CronJob") | .name) // "manual"] | @tsv' 2>/dev/null || echo "")
                  if [ -n "$FAILED_JOB_LIST" ]; then
                    while IFS=$'\t' read -r NS JOB_NAME CREATED CRONJOB; do
                      [ -z "$NS" ] && continue
                      CREATED_EPOCH=$(date -D '%Y-%m-%dT%H:%M:%SZ' -d "$CREATED" +%s 2>/dev/null || echo "0")
                      AGE=$((NOW_EPOCH - CREATED_EPOCH))
                      if [ "$AGE" -gt "$ONE_HOUR" ]; then
                        AGE_H=$((AGE / 3600))
                        echo "  Deleting Failed job $NS/$JOB_NAME (age: ${AGE_H}h, CronJob: $CRONJOB)"
                        kubectl delete job "$JOB_NAME" -n "$NS" || true
                        FAILED_JOBS=$((FAILED_JOBS + 1))
                        echo "$NS/$CRONJOB (age: ${AGE_H}h)" >> "$JOB_DETAILS"
                      else
                        echo "  Keeping $NS/$JOB_NAME (age: $((AGE / 60))m, <1h)"
                      fi
                    done <<< "$FAILED_JOB_LIST"
                  else
                    echo "[Task 3] No Failed jobs found."
                  fi

                  # Task 4: Post Discord embed (only if something was cleaned)
                  TOTAL=$((FAILED_PODS + STOPPED_REPLICAS + FAILED_JOBS))
                  if [ "$TOTAL" -gt 0 ] && [ -f /etc/janitor/webhook-url ]; then
                    WEBHOOK_URL=$(cat /etc/janitor/webhook-url)

                    # Color: green (routine, <=10 items) or yellow (unusual, >10 items)
                    if [ "$TOTAL" -le 10 ]; then
                      EMBED_COLOR=5763719   # green
                    else
                      EMBED_COLOR=16705372  # yellow
                    fi

                    # Build description with details (up to 5 per category, then "and N more")
                    DESC=""

                    if [ "$FAILED_JOBS" -gt 0 ] && [ -s "$JOB_DETAILS" ]; then
                      DESC="${DESC}**Failed Jobs ($FAILED_JOBS):**\n"
                      SHOWN=0
                      while IFS= read -r LINE; do
                        SHOWN=$((SHOWN + 1))
                        [ "$SHOWN" -gt 5 ] && break
                        DESC="${DESC}- ${LINE}\n"
                      done < "$JOB_DETAILS"
                      REMAINING=$((FAILED_JOBS - SHOWN))
                      [ "$REMAINING" -gt 0 ] && DESC="${DESC}  ...and ${REMAINING} more\n"
                      DESC="${DESC}\n"
                    fi

                    if [ "$FAILED_PODS" -gt 0 ] && [ -s "$POD_DETAILS" ]; then
                      DESC="${DESC}**Failed Pods ($FAILED_PODS):**\n"
                      SHOWN=0
                      while IFS= read -r LINE; do
                        SHOWN=$((SHOWN + 1))
                        [ "$SHOWN" -gt 5 ] && break
                        DESC="${DESC}- ${LINE}\n"
                      done < "$POD_DETAILS"
                      REMAINING=$((FAILED_PODS - SHOWN))
                      [ "$REMAINING" -gt 0 ] && DESC="${DESC}  ...and ${REMAINING} more\n"
                      DESC="${DESC}\n"
                    fi

                    if [ "$STOPPED_REPLICAS" -gt 0 ] && [ -s "$REPLICA_DETAILS" ]; then
                      DESC="${DESC}**Stopped Replicas ($STOPPED_REPLICAS):**\n"
                      SHOWN=0
                      while IFS= read -r LINE; do
                        SHOWN=$((SHOWN + 1))
                        [ "$SHOWN" -gt 5 ] && break
                        DESC="${DESC}- ${LINE}\n"
                      done < "$REPLICA_DETAILS"
                      REMAINING=$((STOPPED_REPLICAS - SHOWN))
                      [ "$REMAINING" -gt 0 ] && DESC="${DESC}  ...and ${REMAINING} more\n"
                    fi

                    # Build Discord embed payload with jq
                    PAYLOAD=$(jq -n \
                      --arg title "Cluster Janitor - $(date '+%I:%M%p PHT')" \
                      --arg desc "$DESC" \
                      --argjson color "$EMBED_COLOR" \
                      '{
                        "embeds": [{
                          "title": $title,
                          "description": $desc,
                          "color": $color
                        }]
                      }')

                    echo "[Task 4] Posting to Discord..."
                    HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$WEBHOOK_URL" \
                      -H "Content-Type: application/json" \
                      -d "$PAYLOAD")
                    if [ "$HTTP_CODE" -eq 204 ] || [ "$HTTP_CODE" -eq 200 ]; then
                      echo "  Discord notification sent (HTTP $HTTP_CODE)"
                    else
                      echo "  Warning: Discord notification failed (HTTP $HTTP_CODE)"
                    fi
                  fi

                  # Cleanup temp files
                  rm -f "$POD_DETAILS" "$REPLICA_DETAILS" "$JOB_DETAILS"
                  echo "=== Janitor complete ==="
              volumeMounts:
                - name: discord-webhook
                  mountPath: /etc/janitor
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
          volumes:
            - name: discord-webhook
              secret:
                secretName: discord-janitor-webhook
            - name: tmp
              emptyDir:
                sizeLimit: 1Mi
