# ExternalSecret for cluster janitor Discord webhook
# Phase 4.29: Replaces imperative kubectl create secret
#
# Vault path: secret/kube-system/discord-janitor-webhook
# Creates K8s Secret: discord-janitor-webhook (1 key: webhook-url)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-janitor-webhook
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: discord-janitor-webhook
  data:
    - secretKey: webhook-url
      remoteRef:
        key: kube-system/discord-janitor-webhook
        property: webhook-url
