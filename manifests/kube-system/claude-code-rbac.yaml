apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-code
  namespace: kube-system
---
# ClusterRole: read-only access to all resources EXCEPT secret data.
# Secrets: list-only (table output shows names/metadata, not values).
# NOTE: list verb still exposes data via -o yaml/json — hooks (5.2.4) block this.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-code-role
rules:
  # Core API resources (excluding secrets — handled separately below)
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps", "namespaces",
                "nodes", "persistentvolumes", "persistentvolumeclaims",
                "events", "serviceaccounts", "resourcequotas", "limitranges",
                "replicationcontrollers"]
    verbs: ["get", "list", "watch"]
  # Secrets: list only — shows names/metadata in table format, not values
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["list"]
  # Apps, batch, policy
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # RBAC (for auditing)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Storage
  - apiGroups: ["storage.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Metrics (for kubectl top)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]
  # Coordination (leases — kube-vip debugging)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Events API (newer)
  - apiGroups: ["events.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Discovery (EndpointSlices)
  - apiGroups: ["discovery.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # CRDs needed for homelab operations
  - apiGroups: ["external-secrets.io", "cilium.io", "longhorn.io",
                "gateway.networking.k8s.io", "monitoring.coreos.com"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # Node Feature Discovery
  - apiGroups: ["nfd.k8s-sigs.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-code-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-code-role
subjects:
  - kind: ServiceAccount
    name: claude-code
    namespace: kube-system
