# Portfolio PodDisruptionBudget
# Ensures at least 1 replica remains during voluntary disruptions (drain, upgrade)
# Apply to each namespace: portfolio-dev, portfolio-staging, portfolio-prod
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: portfolio-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: portfolio
