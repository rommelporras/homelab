# CiliumNetworkPolicies for portfolio-dev, portfolio-staging, portfolio-prod
# All 3 namespaces are identical: static site, port 80, no DB, no external egress.
#
# Default-deny is enforced implicitly by Cilium's enable-policy=default mode:
# once any policy selects an endpoint for a direction, all non-matching traffic
# in that direction is denied. No explicit default-deny policy needed (Cilium
# rejects empty ingress: [] / egress: [] policies as invalid).
#
# Egress: allow-dns covers egress -> default-deny egress (DNS only)
# Ingress: portfolio-gateway-ingress + allow-kubelet-probes cover ingress -> default-deny ingress

# ============================================================
# portfolio-dev
# ============================================================
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns
  namespace: portfolio-dev
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: portfolio-gateway-ingress
  namespace: portfolio-dev
spec:
  endpointSelector:
    matchLabels:
      app: portfolio
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # Monitoring: blackbox exporter probes
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kubelet-probes
  namespace: portfolio-dev
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host

