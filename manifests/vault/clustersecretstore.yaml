# manifests/vault/clustersecretstore.yaml
# ClusterSecretStore — connects ESO to Vault via Kubernetes auth
#
# Architecture:
#   ESO controller (external-secrets ns) -> ClusterSecretStore -> Vault (vault ns)
#   Auth: ESO ServiceAccount token validated by Vault's kubernetes auth backend
#   Role: "eso" — bound to external-secrets SA in external-secrets namespace
#   Policy: eso-policy — read secret/data/*, list secret/metadata/*
#
# CKA topics: ServiceAccount token, RBAC, cross-namespace access
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
