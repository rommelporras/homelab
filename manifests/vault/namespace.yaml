# Vault namespace for HashiCorp Vault secrets management
# Phase 4.29 - Vault + External Secrets Operator
#
# PSS: enforce baseline (Vault Helm chart doesn't fully satisfy restricted — vault-helm#1035)
#      audit + warn restricted (guidance for future hardening)
---
apiVersion: v1
kind: Namespace
metadata:
  name: vault
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
