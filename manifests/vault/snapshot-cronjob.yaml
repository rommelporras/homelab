# manifests/vault/snapshot-cronjob.yaml
# Legacy NFS PV + PVC from the vault-namespace snapshot CronJob.
#
# The CronJob and ServiceAccount were removed in Phase 5.9 (v0.39.0) after the
# Argo Workflows CronWorkflow took over daily Vault Raft snapshots. The PV and
# PVC are kept here temporarily so ArgoCD does not prune them while the
# argo-workflows PV (`vault-snapshots-argo-nfs`) rolls out. Both write to the
# same NAS directory during the transition window.
#
# NFS path: 10.10.30.4:/Kubernetes/Backups/vault (UID 65534, RWX, 1Gi)
# Removal: step 5.9.3.10 of the phase plan (5-7 days after cutover) —
# see docs/todo/deferred.md for the checklist.
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: vault-snapshots-nfs
  labels:
    type: nfs
    app: vault-snapshot
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  mountOptions:
    - hard
    - nfsvers=4.1
    - rsize=65536
    - wsize=65536
    - timeo=600
  nfs:
    server: 10.10.30.4
    path: /Kubernetes/Backups/vault
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-snapshots
  namespace: vault
  labels:
    app: vault-snapshot
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      app: vault-snapshot
