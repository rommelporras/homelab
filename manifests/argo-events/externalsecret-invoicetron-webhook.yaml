# manifests/argo-events/externalsecret-invoicetron-webhook.yaml
# Per-project webhook secret for the invoicetron GitLab project
# (per DR-4: per-project secrets, no shared secret - GitLab webhooks
# do not HMAC the payload and `body.project.name` is attacker-
# controlled).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: invoicetron-webhook-secret
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: invoicetron-webhook-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret
      remoteRef:
        key: argo-events/invoicetron-webhook-secret
        property: secret
