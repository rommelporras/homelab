# manifests/argo-events/resourcequota.yaml
# Hard ceiling for the argo-events namespace.
#
# Pod inventory at steady state (Stage 2):
#   - controller-manager                       1 pod
#   - eventbus-default-js-{0,1,2}              3 pods (NATS JetStream,
#                                              3 containers each:
#                                              nats, metrics, reloader
#                                              -> ~600-800Mi each)
#   - gitlab-invoicetron-eventsource           1 pod
#   - gitlab-portfolio-eventsource             1 pod
#   - portfolio-staging-promote-eventsource    1 pod
#   - gitlab-invoicetron-{develop,main}-sensor 2 pods
#   - gitlab-portfolio-{develop,main}-sensor   2 pods
#   - portfolio-staging-promote-sensor         1 pod
#   Total: 12 long-running pods
#
# Initial attempt at 2Gi memory / 2 CPU was rejected at admission with
#   "exceeded quota: argo-events-quota, requested: limits.memory=256Mi"
# because the EventBus StatefulSet alone consumes ~1.5Gi across 3 pods
# when LimitRange default applies.
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: argo-events-quota
  namespace: argo-events
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 5Gi
    pods: "25"
