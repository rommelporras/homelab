# manifests/argo-events/eventsource-staging-promote.yaml
# Generic webhook EventSource for Portfolio staging promotion.
#
# Payload contract:
#   POST /staging-promote
#   headers: X-Staging-Promote-Token: <shared secret>
#   body:    { "source_sha": "abc12345" }
#
# The webhook EventSource accepts the POST regardless of headers;
# Sensor filter validates the token against the mounted Secret before
# creating the Workflow.
---
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: portfolio-staging-promote
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    portfolio-staging-promote:
      endpoint: /staging-promote
      method: POST
      port: "12000"
      url: https://argo-events.k8s.rommelporras.com
