# manifests/argo-events/externalsecret-staging-promote.yaml
# Shared secret for the Portfolio staging-promote webhook. GitLab
# manual job POSTs the payload with this token in a custom header;
# generic webhook EventSource validates it before the Sensor fires.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: staging-promote-token
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: staging-promote-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: argo-events/staging-promote-token
        property: token
