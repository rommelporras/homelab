# manifests/argo-events/externalsecret-gitlab-api.yaml
# GitLab personal access token (scope: api) for EventSource webhook
# auto-registration. Stored in Vault at argo-events/gitlab-api-token.
#
# Used by both eventsource-invoicetron and eventsource-portfolio to
# POST the webhook URL onto each GitLab project via the REST API.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-api-token
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: gitlab-api-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: argo-events/gitlab-api-token
        property: token
