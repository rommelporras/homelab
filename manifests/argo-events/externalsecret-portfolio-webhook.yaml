# manifests/argo-events/externalsecret-portfolio-webhook.yaml
# Per-project webhook secret for the portfolio GitLab project (DR-4).
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: portfolio-webhook-secret
  namespace: argo-events
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: portfolio-webhook-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: secret
      remoteRef:
        key: argo-events/portfolio-webhook-secret
        property: secret
