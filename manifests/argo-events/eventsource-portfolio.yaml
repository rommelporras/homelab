# manifests/argo-events/eventsource-portfolio.yaml
# GitLab EventSource for the portfolio project (DR-6).
# Mirrors the invoicetron EventSource, just pointing at a different
# project path + secret + webhook endpoint.
---
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: gitlab-portfolio
  namespace: argo-events
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  gitlab:
    portfolio:
      projects:
        - "0xwsh/portfolio"
      webhook:
        endpoint: /gitlab/portfolio
        port: "12000"
        method: POST
        url: https://argo-events.k8s.rommelporras.com
      events:
        - PushEvents
      accessToken:
        key: token
        name: gitlab-api-token
      secretToken:
        key: secret
        name: portfolio-webhook-secret
      enableSSLVerification: true
      gitlabBaseURL: https://gitlab.k8s.rommelporras.com
      deleteHookOnFinish: true
