# Grafana Alloy Helm Values for Homelab
# Docs: https://grafana.com/docs/alloy/latest/
#
# Prerequisites:
#   Namespace already created by kube-prometheus-stack (monitoring)
#   Loki already installed (loki.monitoring.svc.cluster.local:3100)
#
# Install:
#   helm-homelab install alloy grafana/alloy \
#     --namespace monitoring \
#     --version 1.6.2 \
#     --values helm/alloy/values.yaml

# =============================================================================
# Controller Configuration
# =============================================================================
# DaemonSet ensures one Alloy pod per node to collect all container logs
controller:
  type: daemonset
  volumes:
    extra:
      - name: audit-logs
        hostPath:
          path: /var/log/kubernetes/audit
          type: DirectoryOrCreate
      # Phase 5.9.7: kernel journal for PCIe AER + other kernel-level errors.
      # Persistent path on Ubuntu 24.04; runtime path is the fallback before
      # /var/log/journal exists (shouldn't matter here - already populated).
      - name: journal-persistent
        hostPath:
          path: /var/log/journal
          type: Directory
      - name: journal-runtime
        hostPath:
          path: /run/log/journal
          type: DirectoryOrCreate
      # Required by systemd journal reader for boot correlation.
      - name: machine-id
        hostPath:
          path: /etc/machine-id
          type: File

# =============================================================================
# Alloy Configuration
# =============================================================================
alloy:
  # Disable anonymous usage reporting
  enableReporting: false

  # The Alloy configuration (River language)
  # This defines the log collection pipeline:
  #   discovery.kubernetes -> discovery.relabel -> loki.source.kubernetes -> loki.write
  configMap:
    create: true
    content: |
      // =======================================================================
      // Pod Discovery
      // =======================================================================
      // Find all pods in the cluster
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // =======================================================================
      // Relabeling - Extract Kubernetes metadata as labels
      // =======================================================================
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        // Keep only pods on this node (important for DaemonSet)
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          action        = "keep"
          regex         = env("HOSTNAME")
        }

        // Set namespace label
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        // Set pod label
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        // Set container label
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        // Set node label
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }

        // Set app label from pod labels (if exists)
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }

        // Set app.kubernetes.io/name label (if exists)
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app_name"
        }
      }

      // =======================================================================
      // Log Collection via Kubernetes API
      // =======================================================================
      // Tail logs from containers using the Kubernetes API (no volume mounts needed)
      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      // =======================================================================
      // Log Processing
      // =======================================================================
      // Add cluster label, filter noisy apps, and forward to Loki
      loki.process "pod_logs" {
        // Add static cluster label
        stage.static_labels {
          values = {
            cluster = "homelab",
          }
        }

        // Drop GitLab Sidekiq INFO/DEBUG logs (17.7% of total log volume)
        // Sidekiq logs are JSON with "severity":"INFO"|"DEBUG"
        stage.match {
          selector = "{namespace=\"gitlab\", container=\"sidekiq\"} |~ \"\\\"severity\\\":\\\"(INFO|DEBUG)\\\"\""
          action   = "drop"
        }

        // Drop version-checker info/debug logs (1.1% of total log volume)
        // version-checker uses logfmt: level=info|level=debug
        stage.match {
          selector = "{app=\"version-checker\"} |~ \"level=(info|debug)\""
          action   = "drop"
        }

        forward_to = [loki.write.loki.receiver]
      }

      // =======================================================================
      // Kubernetes Events Collection (only on k8s-cp1)
      // =======================================================================
      // Collect K8s events (useful for debugging cluster issues)
      // Deduplicated: only k8s-cp1 forwards events (drop stage below).
      // Events can be queried with: {source="kubernetes_events"}
      loki.source.kubernetes_events "cluster_events" {
        log_format = "logfmt"
        forward_to = [loki.process.cluster_events.receiver]
      }

      // Process K8s events - add cluster and source labels
      loki.process "cluster_events" {
        // Add collector node label (to identify which Alloy collected this)
        stage.static_labels {
          values = {
            cluster        = "homelab",
            source         = "kubernetes_events",
            collector_node = env("HOSTNAME"),
          }
        }

        // Drop events from non-primary collectors to avoid triplicates
        // Only k8s-cp1's Alloy will forward events to Loki
        stage.match {
          selector = "{collector_node!=\"k8s-cp1\"}"
          action   = "drop"
        }

        // Phase 5.9.7: count Longhorn AutoSalvaged events as a Prometheus
        // counter. Lines still forward to Loki below for on-demand triage.
        // Only cp1 reaches this stage (see drop above), so no deduplication
        // needed on the counter.
        stage.match {
          selector = "{source=\"kubernetes_events\"} |= \"AutoSalvaged\""

          stage.metrics {
            metric.counter {
              name        = "longhorn_volume_auto_salvaged_total"
              description = "Count of Longhorn AutoSalvaged events observed via k8s event stream (cp1 collector only)."
              action      = "inc"
              match_all   = true
            }
          }
        }

        forward_to = [loki.write.loki.receiver]
      }

      // =======================================================================
      // API Server Audit Log Collection (Phase 5.1)
      // =======================================================================
      // Tail audit log files from /var/log/kubernetes/audit/ (hostPath mount).
      // Only CP nodes have audit logs — Alloy pods on workers find no file.
      local.file_match "audit_logs" {
        path_targets = [{"__path__" = "/var/log/kubernetes/audit/audit.log"}]
        sync_period  = "5s"
      }

      loki.source.file "audit_logs" {
        targets       = local.file_match.audit_logs.targets
        forward_to    = [loki.process.audit_logs.receiver]
        tail_from_end = true
      }

      loki.process "audit_logs" {
        stage.static_labels {
          values = {
            cluster = "homelab",
            source  = "audit_log",
          }
        }

        // Belt and suspenders: drop get/list verbs even if audit policy misses them
        // Audit logs are JSON with "verb":"get"|"list"
        stage.match {
          selector = "{source=\"audit_log\"} |~ \"\\\"verb\\\":\\\"(get|list)\\\"\""
          action   = "drop"
        }

        forward_to = [loki.write.loki.receiver]
      }

      // =======================================================================
      // Kernel Journal Collection (Phase 5.9.7)
      // =======================================================================
      // Tails systemd journal on each node for kernel-transport messages.
      // Emits a Prometheus counter for PCIe Bus Errors (scraped by
      // alloy-servicemonitor.yaml) AND forwards raw lines to Loki for
      // ad-hoc queries. Volume is negligible (<150 KB/day cluster-wide
      // measured 2026-04-14, ~0.05% of existing Loki ingestion).
      loki.source.journal "kernel" {
        forward_to = [loki.process.kernel_logs.receiver]
        matches    = "_TRANSPORT=kernel"
        labels = {
          cluster = "homelab",
          source  = "journal",
          unit    = "kernel",
        }
      }

      loki.process "kernel_logs" {
        // Attach node label so counter + Loki queries can filter per node.
        stage.static_labels {
          values = {
            node = env("HOSTNAME"),
          }
        }

        // PCIe Bus Error counter. stage.regex extracts severity
        // (Correctable / Non-Fatal / Fatal) as a label via
        // labels_from_groups. Lines still forward to Loki below.
        stage.match {
          selector = "{unit=\"kernel\"} |= \"PCIe Bus Error\""

          stage.regex {
            expression         = "severity=(?P<severity>\\w+)"
            labels_from_groups = true
          }

          stage.metrics {
            metric.counter {
              name        = "kernel_pcie_bus_errors_total"
              description = "Count of kernel PCIe Bus Error events per node and severity."
              action      = "inc"
              match_all   = true
            }
          }
        }

        forward_to = [loki.write.loki.receiver]
      }

      // =======================================================================
      // Send to Loki
      // =======================================================================
      loki.write "loki" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

  mounts:
    extra:
      - name: audit-logs
        mountPath: /var/log/kubernetes/audit
        readOnly: true
      # Phase 5.9.7: kernel journal read-only mounts.
      - name: journal-persistent
        mountPath: /var/log/journal
        readOnly: true
      - name: journal-runtime
        mountPath: /run/log/journal
        readOnly: true
      - name: machine-id
        mountPath: /etc/machine-id
        readOnly: true

  # Resource limits for 16GB nodes
  # Increased memory to handle events collection
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# =============================================================================
# Config Reloader
# =============================================================================
# Automatically reloads Alloy when config changes
configReloader:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# =============================================================================
# RBAC - Required for Kubernetes API access
# =============================================================================
# Alloy needs to read pods and their logs via the API
rbac:
  create: true

serviceAccount:
  create: true
