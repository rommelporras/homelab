# kube-prometheus-stack Helm Values for Homelab
# Docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# Prerequisites:
#   kubectl-homelab create namespace monitoring
#   kubectl-homelab label namespace monitoring pod-security.kubernetes.io/enforce=privileged
#   (privileged required: node-exporter needs hostNetwork, hostPID, hostPath)
#
# Install via OCI (no helm repo add needed):
#   helm-homelab install prometheus oci://ghcr.io/prometheus-community/charts/kube-prometheus-stack \
#     --namespace monitoring \
#     --version 81.0.0 \
#     --values helm/prometheus/values.yaml
#
# Secrets: Grafana admin password is via existingSecret (ESO-managed).
#   Alertmanager config is via configSecret (ESO ExternalSecret "alertmanager-config"
#   assembles full alertmanager.yaml from Vault secrets).

# =============================================================================
# kube-proxy
# =============================================================================
# Disabled: Cilium runs in kube-proxy replacement mode — no kube-proxy DaemonSet exists.
# Without this, KubeProxyDown fires permanently and 3 scrape targets show as down.
kubeProxy:
  enabled: false

# =============================================================================
# API Server Metrics Filtering
# =============================================================================
# Drop high-cardinality histogram bucket metrics that aren't used for alerts
# or dashboards. These 5 metrics account for ~50k series (~18% of total).
kubeApiServer:
  serviceMonitor:
    metricRelabelings:
      - sourceLabels: [__name__]
        regex: 'apiserver_request_body_size_bytes_bucket|apiserver_response_sizes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_list_duration_seconds_bucket|apiserver_watch_events_sizes_bucket'
        action: drop

# =============================================================================
# Default Rules
# =============================================================================
# Disable alerts that aren't useful for this homelab setup
defaultRules:
  disabled:
    # InfoInhibitor is a meta-alert for complex info-suppression logic
    # We don't use this - our routing is simple (info → null)
    InfoInhibitor: true
    # CPUThrottlingHigh: replaced by manifests/monitoring/alerts/cpu-throttling-alerts.yaml
    # Changes: threshold 25% → 50%, arr-stack namespace excluded (Tdarr/Byparr are always bursty)
    CPUThrottlingHigh: true
    # NodeMemoryMajorPagesFaults: replaced by manifests/monitoring/alerts/node-alerts.yaml
    # Changes: compound condition (high page faults AND low memory) to avoid NFS false positives
    NodeMemoryMajorPagesFaults: true
    # Watchdog is enabled - routes to healthchecks.io as dead man's switch
    # If alerting breaks, healthchecks.io detects missing pings and alerts via Discord

# =============================================================================
# Prometheus
# =============================================================================
# Time-series database that scrapes and stores all metrics
prometheus:
  prometheusSpec:
    # Cluster label on all metrics — fixes "on cluster ." in CPUThrottlingHigh alerts
    externalLabels:
      cluster: homelab

    # How long to keep data (default: 10d)
    # 60d retention. At ~0.2 GiB/day (post metric filtering), steady-state ~12 GiB.
    # PVC sized at 60Gi for headroom while old high-cardinality data expires.
    retention: 60d

    # Storage - uses Longhorn PVC
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 60Gi

    # Resource limits for 16GB nodes
    # Prometheus can be memory-hungry, especially with many metrics
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    # Scrape all ServiceMonitors in all namespaces (not just monitoring)
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false  # Required for Probe CRDs (blackbox exporter)

# =============================================================================
# Grafana
# =============================================================================
# Visualization dashboards
grafana:
  # Admin password from ESO-managed K8s Secret (Vault: monitoring/grafana)
  admin:
    existingSecret: monitoring-grafana-admin
    passwordKey: admin-password

  # version-checker annotations - filter false positive tags
  podAnnotations:
    match-regex.version-checker.io/grafana: "^\\d+\\.\\d+\\.\\d+$"
    pin-major.version-checker.io/grafana-sc-dashboard: "2"
    pin-major.version-checker.io/grafana-sc-datasources: "2"

  # Persistence - dashboards survive pod restarts
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 10Gi

  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Dashboard sidecar — enables grafana_folder annotation for folder organization
  sidecar:
    dashboards:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
    datasources:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

  # Grafana configuration
  grafana.ini:
    server:
      # Root URL for links in emails, etc.
      root_url: https://grafana.k8s.rommelporras.com

    # Disable analytics/telemetry
    analytics:
      reporting_enabled: false
      check_for_updates: false

# =============================================================================
# Alertmanager
# =============================================================================
# Handles alerts from Prometheus
#
# Notification Routing:
#   - Critical alerts → Discord #incidents + Email (critical@rommelporras.com)
#   - Warning (infra) alerts → Discord #infra (Longhorn, NVMe, certs, nodes, UPS, logging)
#   - Warning (apps) alerts → Discord #apps (catch-all for non-infra warnings)
#
# Alertmanager config is assembled by ESO ExternalSecret "alertmanager-config"
# (manifests/monitoring/externalsecret.yaml). Secrets are pulled from Vault and
# templated into a complete alertmanager.yaml. No upgrade script needed.
#
alertmanager:
  alertmanagerSpec:
    # Use ESO-managed Secret for alertmanager config (replaces alertmanager.config block)
    # Secret contains full alertmanager.yaml with real credentials from Vault
    configSecret: alertmanager-config

    # Storage for silences and notifications
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# =============================================================================
# node-exporter
# =============================================================================
# DaemonSet that runs on every node to collect hardware/OS metrics
# CKA Topic: DaemonSets ensure one pod per node
prometheus-node-exporter:
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      # No CPU limit - node-exporter bursts during scrapes, throttling is counterproductive
      # CPU is compressible; memory is not. Only memory limits matter for stability.
      memory: 64Mi

# =============================================================================
# kube-state-metrics
# =============================================================================
# Exposes metrics about Kubernetes objects (pods, deployments, etc.)
kube-state-metrics:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      # No CPU limit - same rationale as node-exporter
      memory: 128Mi

# =============================================================================
# Prometheus Operator
# =============================================================================
# Manages Prometheus and Alertmanager instances via CRDs
prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

  # Config reloader sidecar (injected into Prometheus and Alertmanager pods)
  prometheusConfigReloader:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
