# helm/external-secrets/values.yaml
# External Secrets Operator — syncs secrets from Vault into K8s Secrets
#
# Chart: external-secrets/external-secrets v2.1.0 (app v2.1.0)
# Docs: https://external-secrets.io/latest/
#
# Architecture:
#   - ClusterSecretStore connects to Vault via Kubernetes auth
#   - ExternalSecret CRDs (per namespace) define which Vault paths to sync
#   - ESO creates/updates K8s Secrets automatically (1h sync interval)
#   - ServiceMonitor enabled for Prometheus scraping of ESO metrics
#
# INSTALL:
#   helm-homelab install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets \
#     --create-namespace \
#     --version 2.1.0 \
#     --values helm/external-secrets/values.yaml
#
# UPGRADE:
#   helm-homelab upgrade external-secrets external-secrets/external-secrets \
#     --namespace external-secrets \
#     --version 2.1.0 \
#     --values helm/external-secrets/values.yaml

installCRDs: true

# Phase 5.0: Disable unused CRD reconcilers (ESO threat model C05)
# Not using ClusterExternalSecret or PushSecret (0 references in codebase)
processClusterExternalSecret: false
processClusterPushSecret: false
processPushSecret: false

# Phase 5.0: Resource limits for all ESO pods
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

serviceMonitor:
  enabled: true
  interval: 30s
  namespace: monitoring

webhook:
  create: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # Phase 5.0: Restrict TLS ciphers to modern suites
  extraArgs:
    tls-ciphers: "TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256"

certController:
  create: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
