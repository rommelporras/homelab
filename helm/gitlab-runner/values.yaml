# helm/gitlab-runner/values.yaml
# GitLab Runner with Kubernetes Executor
#
# Chart version: 0.85.0 (Runner 18.8.0)
# Docs: https://docs.gitlab.com/runner/install/kubernetes/
#
# IMPORTANT: Uses new authentication token workflow (GitLab 17.0+)
# Runner configuration (tags, run untagged, etc.) is done in GitLab UI,
# NOT in this file.
#
# INSTALL:
#   helm-homelab install gitlab-runner gitlab/gitlab-runner \
#     --namespace gitlab-runner \
#     --version 0.85.0 \
#     --values helm/gitlab-runner/values.yaml
#
# UPGRADE:
#   helm-homelab upgrade gitlab-runner gitlab/gitlab-runner \
#     --namespace gitlab-runner \
#     --version 0.85.0 \
#     --values helm/gitlab-runner/values.yaml

# GitLab instance URL
gitlabUrl: https://gitlab.k8s.rommelporras.com

# Maximum concurrent CI jobs across all runners
# Each job pod uses up to 4Gi memory + 256Mi helper = ~4.3Gi.
# 3 nodes x 16Gi each, ~4-6Gi for system workloads = ~10Gi/node for CI.
# 4 concurrent keeps total job memory at ~17Gi spread across 3 nodes (safe).
# Default is 10 - caused OOM when both invoicetron + portfolio pipelines
# triggered simultaneously (7 concurrent pods, 28Gi limit on one node).
concurrent: 4

# Runner authentication token (from secret)
runners:
  secret: gitlab-runner-token

  # Kubernetes executor configuration
  config: |
    [[runners]]
      [runners.kubernetes]
        namespace = "gitlab-runner"
        image = "alpine:latest"

        # Required for Docker-in-Docker (building container images)
        privileged = true

        # Resource limits for CI job pods
        # v0.28.1: raised memory from 2Gi→4Gi after Next.js build OOM killed node
        # Next.js `bun run build` + TypeScript checking peaks at ~3Gi
        cpu_limit = "2"
        cpu_request = "500m"
        memory_limit = "4Gi"
        memory_request = "1Gi"

        # Helper container resources
        helper_cpu_limit = "500m"
        helper_cpu_request = "100m"
        helper_memory_limit = "256Mi"
        helper_memory_request = "128Mi"

        # Pull policy
        pull_policy = "if-not-present"

        # Pod labels for identification
        [runners.kubernetes.pod_labels]
          "gitlab-runner" = "true"

        # Spread job pods across nodes to prevent single-node OOM.
        # Soft anti-affinity: scheduler prefers different nodes but doesn't block
        # if only one node has capacity. Matches on gitlab-runner=true pod label.
        [runners.kubernetes.affinity]
          [runners.kubernetes.affinity.pod_anti_affinity]
            [[runners.kubernetes.affinity.pod_anti_affinity.preferred_during_scheduling_ignored_during_execution]]
              weight = 100
              [runners.kubernetes.affinity.pod_anti_affinity.preferred_during_scheduling_ignored_during_execution.pod_affinity_term]
                topology_key = "kubernetes.io/hostname"
                [runners.kubernetes.affinity.pod_anti_affinity.preferred_during_scheduling_ignored_during_execution.pod_affinity_term.label_selector]
                  [[runners.kubernetes.affinity.pod_anti_affinity.preferred_during_scheduling_ignored_during_execution.pod_affinity_term.label_selector.match_expressions]]
                    key = "gitlab-runner"
                    operator = "In"
                    values = ["true"]

# RBAC - required for creating job pods
rbac:
  create: true
  # clusterWideAccess=true creates a ClusterRole (resources=* verbs=* on core API) — overly broad.
  # false creates a namespace-scoped Role in gitlab-runner only, which is sufficient because:
  #   - runner.kubernetes.namespace = "gitlab-runner" (all job pods created there)
  #   - cross-namespace deployments use the gitlab-deploy SA (namespace Roles), not the runner SA
  # Phase 5.2: changed true → false to remove cluster-wide secrets/pods CRUD
  clusterWideAccess: false

# Service account for the runner pod
serviceAccount:
  create: true

# Runner pod resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
