# helm/argo-events/values.yaml
# Argo Events chart values - chart 2.4.21 (verify before apply; chart
# cadence is weekly - update pin if newer stable exists).
#
# Controllers managed:
#   - eventsource-controller: watches EventSource CRs, spawns a
#     webhook-listener pod per EventSource.
#   - sensor-controller: watches Sensor CRs, spawns a per-Sensor pod
#     that subscribes to the EventBus.
#   - eventbus-controller: watches EventBus CRs, spawns NATS
#     JetStream StatefulSet per EventBus.
#
# Chart's built-in webhook is disabled - we do not use the chart-
# native webhook pattern; GitLab EventSources in this repo listen
# on per-project paths via our own HTTPRoute.

# -------------- controller-manager --------------
# Image intentionally not overridden - the chart's default
# `quay.io/argoproj/argo-events:<chart appVersion>` (v1.9.10 at chart
# 2.4.21) is the right image. An earlier attempt to set
# `controller.image.registry/repository/tag` failed because this chart
# uses `global.image.repository` (full path) + `global.image.tag`
# instead of the split-field pattern used by other argoproj charts.
controller:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
    seccompProfile:
      type: RuntimeDefault
  metrics:
    enabled: true
    port: 7777
  # ServiceMonitor shipped separately under manifests/argo-events/
  # servicemonitor.yaml so the scrape label matches our release=prometheus
  # convention rather than the chart's default.
  serviceMonitor:
    enabled: false

# -------------- configs (use chart defaults) --------------
# The chart ships `configs.jetstream.settings` as a map with typed
# keys (maxFileStore, maxMemoryStore). Overriding with a YAML string
# block fails with:
#   cannot overwrite table with non table for argo-events.configs.jetstream.settings
# Defaults (-1 = unlimited) are fine for a homelab CI workload; our
# EventBus CR (manifests/argo-events/eventbus.yaml) sets replicas and
# resources explicitly, which is what actually matters.

# -------------- webhook (disabled) --------------
# The chart's optional `argo-events-webhook` is an admission webhook for
# validating custom resources. We skip it to reduce blast radius; the
# CRDs have enough schema validation on their own.
webhook:
  enabled: false

# -------------- CRDs --------------
crds:
  install: true
  keep: true
